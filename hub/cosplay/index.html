<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#0a0a0f"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>Косплей</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --bg:#0a0a0f;--s1:#111118;--s2:#18181f;--s3:#22222c;
      --border:#2c2c38;--text:#f0eeff;--muted:#585870;--dim:#8080a0;
      --pink:#ff6eb4;--purple:#a78bfa;--cyan:#67e8f9;--green:#86efac;
      --orange:#fb923c;--danger:#f87171;
      --r:12px;--rL:22px;
      --ff:'Syne',sans-serif;--fb:'Golos Text',sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden;background:var(--bg)}
    body{font-family:var(--fb);color:var(--text);-webkit-font-smoothing:antialiased;font-size:15px}
    button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
    input,textarea,select{font-family:inherit;color:inherit;background:none;border:none;outline:none}
    #app{display:flex;flex-direction:column;height:100dvh}

    /* NAV */
    .nav{flex-shrink:0;padding:calc(env(safe-area-inset-top,0px) + 10px) 16px 0;display:flex;align-items:center;gap:6px;min-height:44px}
    .nav-back{width:34px;height:34px;border-radius:10px;background:var(--s2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;transition:transform .1s}
    .nav-back:active{transform:scale(.9)}
    .nav-crumb{flex:1;font-family:var(--ff);font-size:13px;font-weight:600;color:var(--muted);overflow:hidden;display:flex;align-items:center;gap:4px}
    .nav-crumb .sep{color:var(--border)}
    .nav-crumb .cur{color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .nav-actions{display:flex;gap:6px;flex-shrink:0}
    .icon-btn{width:34px;height:34px;border-radius:10px;background:var(--s2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:15px;transition:transform .1s}
    .icon-btn:active{transform:scale(.9)}

    /* PAGE HEADER */
    .page-hdr{flex-shrink:0;padding:10px 16px 12px}
    .page-title{font-family:var(--ff);font-size:24px;font-weight:800;letter-spacing:-.5px}
    .page-title em{font-style:normal;background:linear-gradient(90deg,var(--pink),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .page-sub{font-size:13px;color:var(--muted);margin-top:3px}

    /* SCROLL */
    .scroll{flex:1;overflow-y:auto;padding:4px 16px 100px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
    .scroll::-webkit-scrollbar{width:3px}
    .scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

    /* STATES */
    .center{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;height:220px;color:var(--muted)}
    .spinner{width:26px;height:26px;border:2px solid var(--border);border-top-color:var(--pink);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .empty-ico{font-size:48px}
    .empty-txt{font-family:var(--ff);font-size:13px}
    @keyframes pop{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
    @keyframes slideR{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}

    /* CHAR GRID */
    .char-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .char-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--rL);overflow:hidden;cursor:pointer;transition:border-color .2s,transform .15s;animation:pop .25s cubic-bezier(.16,1,.3,1) both;position:relative}
    .char-card:active{transform:scale(.95)}
    .char-card:hover{border-color:var(--purple)}
    .char-cover{width:100%;aspect-ratio:3/4;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:40px;position:relative;overflow:hidden}
    .char-cover img{width:100%;height:100%;object-fit:cover}
    .char-grad{position:absolute;bottom:0;left:0;right:0;height:60%;background:linear-gradient(to top,rgba(10,10,15,.95),transparent)}
    .char-info{position:absolute;bottom:0;left:0;right:0;padding:10px 12px}
    .char-name{font-family:var(--ff);font-size:14px;font-weight:700;line-height:1.2}
    .char-sub{font-size:11px;color:var(--dim);margin-top:2px}
    .char-prog-bar{position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--s3)}
    .char-prog-fill{height:100%;background:linear-gradient(90deg,var(--pink),var(--purple));transition:width .4s}

    /* LOOK LIST */
    .look-card{display:flex;align-items:center;gap:0;background:var(--s1);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;margin-bottom:8px;transition:border-color .15s,transform .1s;animation:slideR .22s cubic-bezier(.16,1,.3,1) both}
    .look-card:active{transform:scale(.98)}
    .look-thumb{width:80px;height:80px;flex-shrink:0;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:28px;overflow:hidden}
    .look-thumb img{width:100%;height:100%;object-fit:cover}
    .look-body{flex:1;min-width:0;padding:12px}
    .look-name{font-family:var(--ff);font-size:15px;font-weight:700;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .look-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .sc{padding:3px 10px;border-radius:100px;font-size:11px;font-weight:700;font-family:var(--ff)}
    .sc-planning{background:rgba(107,114,128,.15);color:#9ca3af}
    .sc-progress{background:rgba(251,146,60,.15);color:var(--orange)}
    .sc-ready{background:rgba(134,239,172,.15);color:var(--green)}
    .look-count{font-size:12px;color:var(--muted)}
    .look-prog{height:3px;background:var(--s3);margin-top:7px;border-radius:3px;overflow:hidden}
    .look-prog-fill{height:100%;background:linear-gradient(90deg,var(--pink),var(--purple))}

    /* ITEM LIST */
    .item-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;cursor:pointer;overflow:hidden;transition:border-color .15s,transform .1s;animation:pop .2s cubic-bezier(.16,1,.3,1) both}
    .item-card:active{transform:scale(.985)}
    .item-inner{display:flex;align-items:flex-start;gap:12px;padding:12px}
    .item-thumb{width:62px;height:62px;flex-shrink:0;border-radius:10px;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:24px;overflow:hidden}
    .item-thumb img{width:100%;height:100%;object-fit:cover}
    .item-body{flex:1;min-width:0}
    .item-name{font-family:var(--ff);font-size:14px;font-weight:700;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .item-type{font-size:12px;color:var(--muted);margin-bottom:5px}
    .item-st{padding:3px 10px;border-radius:100px;font-size:11px;font-weight:700;font-family:var(--ff)}
    .is-have{background:rgba(134,239,172,.12);color:var(--green)}
    .is-buy{background:rgba(167,139,250,.12);color:var(--purple)}
    .is-make{background:rgba(103,232,249,.12);color:var(--cyan)}
    .vars-strip{display:flex;gap:6px;padding:0 12px 10px;overflow-x:auto;scrollbar-width:none}
    .vars-strip::-webkit-scrollbar{display:none}
    .var-chip{flex-shrink:0;display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:8px;background:var(--s2);border:1px solid var(--border);font-size:12px;color:var(--dim);text-decoration:none;transition:border-color .15s,color .15s}
    .var-chip:hover{border-color:var(--purple);color:var(--text)}
    .var-chip.pref{border-color:var(--pink);color:var(--pink)}
    .var-price{font-weight:700}

    /* FAB */
    .fab{position:fixed;bottom:calc(20px + env(safe-area-inset-bottom,0));right:18px;width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;font-size:24px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 24px rgba(255,110,180,.35);transition:transform .15s;z-index:20}
    .fab:active{transform:scale(.9)}

    /* OVERLAY + SHEET */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;opacity:0;pointer-events:none;transition:opacity .25s;backdrop-filter:blur(8px)}
    .overlay.on{opacity:1;pointer-events:all}
    .sheet{position:fixed;bottom:0;left:0;right:0;background:var(--s1);border-radius:var(--rL) var(--rL) 0 0;border-top:1px solid var(--border);z-index:101;max-height:94dvh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .32s cubic-bezier(.16,1,.3,1)}
    .sheet.on{transform:translateY(0)}
    .sheet-drag{width:36px;height:4px;background:var(--border);border-radius:4px;margin:12px auto 0;flex-shrink:0}
    .sheet-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 10px;flex-shrink:0}
    .sheet-title{font-family:var(--ff);font-size:16px;font-weight:700}
    .close-btn{width:30px;height:30px;border-radius:8px;background:var(--s3);display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:16px}
    .sheet-body{overflow-y:auto;padding:0 18px 44px;flex:1;scrollbar-width:thin;scrollbar-color:var(--border) transparent}

    /* FORM */
    .fg{margin-bottom:14px}
    .fl{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;font-family:var(--ff)}
    .fi{width:100%;padding:11px 13px;background:var(--s2);border:1px solid var(--border);border-radius:var(--r);font-size:14px;color:var(--text);transition:border-color .15s}
    .fi:focus{border-color:var(--purple)}
    .fi::placeholder{color:var(--muted)}
    textarea.fi{resize:vertical;min-height:70px}
    select.fi{cursor:pointer;appearance:none}
    .frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}

    .img-up{width:100%;height:130px;border-radius:var(--r);border:1.5px dashed var(--border);background:var(--s2);display:flex;align-items:center;justify-content:center;gap:8px;color:var(--muted);font-size:13px;cursor:pointer;position:relative;overflow:hidden;transition:border-color .15s}
    .img-up:hover{border-color:var(--purple)}
    .img-up img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
    .img-mask{position:absolute;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;font-size:13px;opacity:0;transition:opacity .15s}
    .img-up:hover .img-mask{opacity:1}

    .pill-sel{display:flex;gap:6px;flex-wrap:wrap}
    .pill-opt{padding:8px 14px;border-radius:100px;font-size:12px;font-weight:700;border:1px solid var(--border);background:var(--s2);color:var(--muted);transition:all .15s;cursor:pointer;font-family:var(--ff)}
    .pill-opt.on-planning{background:rgba(107,114,128,.15);color:#9ca3af;border-color:#4b5563}
    .pill-opt.on-progress{background:rgba(251,146,60,.15);color:var(--orange);border-color:var(--orange)}
    .pill-opt.on-ready{background:rgba(134,239,172,.15);color:var(--green);border-color:var(--green)}
    .pill-opt.on-have{background:rgba(134,239,172,.12);color:var(--green);border-color:var(--green)}
    .pill-opt.on-buy{background:rgba(167,139,250,.12);color:var(--purple);border-color:var(--purple)}
    .pill-opt.on-make{background:rgba(103,232,249,.12);color:var(--cyan);border-color:var(--cyan)}

    .refs-wrap{display:flex;gap:8px;flex-wrap:wrap}
    .ref-thumb{width:70px;height:70px;border-radius:10px;overflow:hidden;position:relative;background:var(--s3);flex-shrink:0}
    .ref-thumb img{width:100%;height:100%;object-fit:cover}
    .ref-del{position:absolute;top:2px;right:2px;width:18px;height:18px;background:rgba(0,0,0,.7);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;cursor:pointer}
    .ref-add{width:70px;height:70px;border-radius:10px;border:1.5px dashed var(--border);background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--muted);cursor:pointer;transition:border-color .15s,color .15s;flex-shrink:0}
    .ref-add:hover{border-color:var(--purple);color:var(--purple)}

    .vars-editor{display:flex;flex-direction:column;gap:8px}
    .var-row{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--s2);border:1px solid var(--border);border-radius:var(--r)}
    .var-row.pref{border-color:var(--pink)}
    .var-fields{flex:1;display:flex;flex-direction:column;gap:6px}
    .var-fields input{font-size:13px;background:var(--s3);padding:6px 10px;border-radius:8px;border:1px solid var(--border);color:var(--text);width:100%}
    .var-fields input:focus{border-color:var(--purple);outline:none}
    .var-right{display:flex;flex-direction:column;align-items:center;gap:6px;flex-shrink:0}
    .star-btn{font-size:18px;opacity:.35;transition:opacity .15s,transform .15s}
    .star-btn.on{opacity:1;transform:scale(1.1)}
    .del-var{font-size:18px;color:var(--muted);transition:color .15s}
    .del-var:hover{color:var(--danger)}
    .btn-add-var{width:100%;padding:10px;border:1.5px dashed var(--border);border-radius:var(--r);font-size:13px;font-weight:600;color:var(--muted);transition:all .15s}
    .btn-add-var:hover{border-color:var(--purple);color:var(--purple)}

    .btn-save{width:100%;padding:14px;background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;border-radius:var(--r);font-family:var(--ff);font-size:14px;font-weight:700;transition:transform .1s,opacity .15s;margin-top:6px}
    .btn-save:active{transform:scale(.98)}
    .btn-save:disabled{opacity:.4;pointer-events:none}
    .btn-del{width:100%;padding:12px;border:1px solid rgba(248,113,113,.25);color:var(--danger);border-radius:var(--r);font-size:13px;font-weight:600;transition:background .15s;margin-top:6px}
    .btn-del:hover{background:rgba(248,113,113,.08)}

    .toast{position:fixed;bottom:86px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--s2);border:1px solid var(--border);border-radius:100px;padding:9px 18px;font-size:13px;font-weight:500;white-space:nowrap;opacity:0;transition:opacity .2s,transform .2s;z-index:300;pointer-events:none}
    .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
    .toast.ok{border-color:var(--green);color:var(--green)}
    .toast.err{border-color:var(--danger);color:var(--danger)}
  </style>
</head>
<body>
<div id="app">
  <div class="nav">
    <button class="nav-back" id="backBtn" style="display:none">‹</button>
    <div class="nav-crumb" id="breadcrumb"></div>
    <div class="nav-actions">
      <button class="icon-btn" id="btnSync">⟳</button>
    </div>
  </div>
  <div class="page-hdr">
    <div class="page-title" id="pageTitle">КОС<em>ПЛЕЙ</em></div>
    <div class="page-sub" id="pageSub">Персонажи</div>
  </div>
  <div class="scroll">
    <div class="center" id="loadingEl"><div class="spinner"></div></div>
    <div id="mainContent" style="display:none"></div>
    <div class="center" id="emptyEl" style="display:none">
      <div class="empty-ico">🎭</div>
      <div class="empty-txt">Пусто — нажми +</div>
    </div>
  </div>
  <button class="fab" id="fabAdd">+</button>
</div>

<div class="overlay" id="overlay"></div>
<div class="sheet" id="formSheet">
  <div class="sheet-drag"></div>
  <div class="sheet-hdr">
    <div class="sheet-title" id="formTitle"></div>
    <button class="close-btn" id="formClose">✕</button>
  </div>
  <div class="sheet-body" id="formBody"></div>
</div>

<div class="toast" id="toastEl"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
window.onerror = function(msg,src,line,col,err){ alert(line+': '+msg); };

"use strict";

// ════════════════════════════════════════
// UTILS — первыми, используются везде
// ════════════════════════════════════════
function ge(id) { return document.getElementById(id); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtP(n) { return Number(n).toLocaleString('ru-RU')+' ₽'; }
var _tt;
function toast(msg, type) {
  var el = ge('toastEl');
  if (!el) return;
  el.textContent = msg;
  el.className = 'toast on ' + (type||'');
  clearTimeout(_tt);
  _tt = setTimeout(function(){ el.classList.remove('on'); }, 2500);
}

// ════════════════════════════════════════
// CONFIG
// ════════════════════════════════════════
var SUPABASE_URL  = 'https://wjeleewngroogzihfthv.supabase.co';
var SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndqZWxlZXduZ3Jvb2d6aWhmdGh2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3OTE1NjQsImV4cCI6MjA5MzM2NzU2NH0.gsBzZ2XCNdp-iP5_cKP12d8eVISmLerhU8LUSR3BJHI';
var BUCKET = 'media';
var DEMO = SUPABASE_URL.indexOf('YOUR_PROJECT') !== -1;
var sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// ════════════════════════════════════════
// STATE
// ════════════════════════════════════════
var view = 'chars';
var curChar = null;
var curLook = null;
var characters = [];
var looks = [];
var items = [];
var itemTypes = [];

// form state
var _editId = null;
var _variantsDraft = [];
var _refsDraft = [];
var _coverFile = null; var _coverUrl = null;
var _photoFile = null; var _photoUrl = null;

// ════════════════════════════════════════
// SUPABASE
// ════════════════════════════════════════
async function loadCharacters() {
  if (DEMO) { characters = demoChars(); return; }
  var r = await sb.from('cosplay_characters').select('*').order('created_at');
  if (r.error) { toast('Ошибка: '+r.error.message,'err'); return; }
  characters = r.data || [];
}
async function loadLooks(charId) {
  if (DEMO) { looks = demoLooks(charId); return; }
  var r = await sb.from('cosplay_looks').select('*').eq('character_id', charId).order('created_at');
  if (r.error) { toast('Ошибка: '+r.error.message,'err'); return; }
  looks = r.data || [];
}
async function loadItems(lookId) {
  if (DEMO) { items = demoItems(lookId); return; }
  var look = looks.find(function(l){ return l.id === lookId; });
  if (!look || !look.item_ids || !look.item_ids.length) { items = []; return; }
  var r = await sb.from('cosplay_items').select('*').in('id', look.item_ids);
  if (r.error) { toast('Ошибка: '+r.error.message,'err'); return; }
  items = r.data || [];
}
async function loadItemTypes() {
  if (DEMO) { itemTypes = demoTypes(); return; }
  var r = await sb.from('cosplay_item_types').select('*').order('name');
  itemTypes = r.data || [];
}

async function saveChar(payload, id) {
  if (DEMO) {
    if (id) { var i=characters.findIndex(function(c){return c.id===id;}); if(i>=0) Object.assign(characters[i],payload); }
    else characters.push(Object.assign({id:'c'+Date.now(),created_at:new Date().toISOString()},payload));
    return;
  }
  var r = id ? await sb.from('cosplay_characters').update(payload).eq('id',id)
              : await sb.from('cosplay_characters').insert(payload);
  if (r.error) throw r.error;
}
async function deleteChar(id) {
  if (DEMO) { characters=characters.filter(function(c){return c.id!==id;}); return; }
  var r = await sb.from('cosplay_characters').delete().eq('id',id);
  if (r.error) throw r.error;
}

async function saveLook(payload, id) {
  if (DEMO) {
    if (id) { var i=looks.findIndex(function(l){return l.id===id;}); if(i>=0) Object.assign(looks[i],payload); }
    else looks.push(Object.assign({id:'l'+Date.now(),created_at:new Date().toISOString(),item_ids:[]},payload));
    return;
  }
  var r = id ? await sb.from('cosplay_looks').update(payload).eq('id',id)
              : await sb.from('cosplay_looks').insert(Object.assign({character_id:curChar.id},payload));
  if (r.error) throw r.error;
}
async function deleteLook(id) {
  if (DEMO) { looks=looks.filter(function(l){return l.id!==id;}); return; }
  var r = await sb.from('cosplay_looks').delete().eq('id',id);
  if (r.error) throw r.error;
}


async function saveItem(payload, id) {
  if (DEMO) {
    if (id) {
      var i=items.findIndex(function(x){return x.id===id;});
      if(i>=0) Object.assign(items[i],payload);
    } else {
      var ni = Object.assign({id:'i'+Date.now(),created_at:new Date().toISOString()},payload);
      items.push(ni);
      var l=looks.find(function(l){return l.id===curLook.id;});
      if(l) l.item_ids=(l.item_ids||[]).concat([ni.id]);
    }
    return;
  }
  var itemId = id;
  if (id) {
    var r2 = await sb.from('cosplay_items').update(payload).eq('id',id);
    if (r2.error) throw r2.error;
  } else {
    var r3 = await sb.from('cosplay_items').insert(payload).select().single();
    if (r3.error) throw r3.error;
    itemId = r3.data.id;
    var look2 = looks.find(function(l){return l.id===curLook.id;});
    var newIds = (look2&&look2.item_ids||[]).concat([itemId]);
    var r4 = await sb.from('cosplay_looks').update({item_ids:newIds}).eq('id',curLook.id);
    if (r4.error) throw r4.error;
  }
  // Синхронизируем preferred-вариант в общую таблицу покупок
  await syncItemToPurchases(itemId, payload);
}

// Синхронизация preferred-варианта косплей-предмета → purchases
async function syncItemToPurchases(itemId, payload) {
  try {
    var variants = payload.variants || [];
    if (typeof variants === 'string') { try { variants = JSON.parse(variants); } catch(e) { variants = []; } }
    var pref = variants.find(function(v){ return v.is_preferred; });

    // Ищем существующую запись в purchases
    var existing = await sb.from('purchases')
      .select('id').eq('source_module','cosplay').eq('source_item_id',itemId).single();

    if (pref) {
      // Есть preferred вариант — создаём/обновляем запись в покупках
      var purchasePayload = {
        name:           payload.name || '',
        module:         'cosplay',
        source_module:  'cosplay',
        source_item_id: itemId,
        shop_name:      pref.shop_name || null,
        url:            pref.url || null,
        price:          pref.price || null,
        photo_url:      (payload.photos && payload.photos[0]) || null,
        status:         payload.status === 'have' ? 'done' : 'want',
        category:       'Косплей',
        is_preferred:   true,
        tags:           ['косплей'],
      };
      if (existing.data) {
        await sb.from('purchases').update(purchasePayload).eq('id', existing.data.id);
      } else {
        await sb.from('purchases').insert(purchasePayload);
      }
    } else {
      // Нет preferred варианта — удаляем запись из покупок (если была)
      if (existing.data) {
        await sb.from('purchases').delete().eq('id', existing.data.id);
      }
    }
  } catch(e) {
    // Не прерываем основной флоу если синхронизация упала
    console.warn('syncItemToPurchases error:', e);
  }
}

async function deleteItem(id) {
  if (DEMO) {
    items=items.filter(function(x){return x.id!==id;});
    var l=looks.find(function(l){return l.id===curLook.id;});
    if(l) l.item_ids=(l.item_ids||[]).filter(function(x){return x!==id;});
    return;
  }
  var r = await sb.from('cosplay_items').delete().eq('id',id);
  if (r.error) throw r.error;
  var look3=looks.find(function(l){return l.id===curLook.id;});
  var newIds2=(look3&&look3.item_ids||[]).filter(function(x){return x!==id;});
  await sb.from('cosplay_looks').update({item_ids:newIds2}).eq('id',curLook.id);
  // Удаляем из покупок
  await sb.from('purchases').delete().eq('source_module','cosplay').eq('source_item_id',id);
}

async function uploadFile(file, folder) {
  var ext = file.name.split('.').pop();
  var path = 'cosplay/'+folder+'/'+Date.now()+'.'+ext;
  var r = await sb.storage.from(BUCKET).upload(path,file,{upsert:true});
  if (r.error) throw r.error;
  return sb.storage.from(BUCKET).getPublicUrl(path).data.publicUrl;
}

// RENDER HELPERS

function showLoading() {
  ge('loadingEl').style.display = 'flex';
  ge('mainContent').style.display = 'none';
  ge('emptyEl').style.display = 'none';
}
function showContent(html) {
  ge('loadingEl').style.display = 'none';
  if (!html) {
    ge('emptyEl').style.display = 'flex';
    ge('mainContent').style.display = 'none';
    return;
  }
  ge('mainContent').innerHTML = html;
  ge('mainContent').style.display = 'block';
  ge('emptyEl').style.display = 'none';
}

// ════════════════════════════════════════
// RENDER LOOKS
// ════════════════════════════════════════
function renderLooks() {
  if (!looks.length) { showContent(''); return; }
  var html = looks.map(function(l, idx) {
    var scCls = l.status==='ready' ? 'sc-ready' : l.status==='progress' ? 'sc-progress' : 'sc-planning';
    var scTxt = l.status==='ready' ? 'Готов' : l.status==='progress' ? 'В процессе' : 'Планирую';
    var total = (l.item_ids||[]).length;
    var prog  = l.progress || 0;
    var thumb = (l.refs && l.refs[l.main_ref_index||0])
      ? '<img src="'+esc(l.refs[l.main_ref_index||0])+'" loading="lazy"/>' : '✨';
    return '<div class="look-card" data-id="'+l.id+'" style="animation-delay:'+idx*.04+'s">'
      + '<div class="look-thumb">'+thumb+'</div>'
      + '<div class="look-body">'
      + '<div class="look-name">'+esc(l.name)+'</div>'
      + '<div class="look-meta"><span class="sc '+scCls+'">'+scTxt+'</span>'
      + '<span class="look-count">'+total+' предметов</span></div>'
      + '<div class="look-prog"><div class="look-prog-fill" style="width:'+prog+'%"></div></div>'
      + '</div></div>';
  }).join('');
  showContent(html);
  ge('mainContent').querySelectorAll('.look-card').forEach(function(el) {
    el.addEventListener('click', function() {
      gotoItems(looks.find(function(l){return l.id===el.dataset.id;}));
    });
    el.addEventListener('contextmenu', function(e) {
      e.preventDefault();
      openEditLook(el.dataset.id);
    });
  });
}

// ════════════════════════════════════════
// RENDER ITEMS
// ════════════════════════════════════════
function renderItems() {
  if (!items.length) { showContent(''); return; }
  var html = items.map(function(item, idx) {
    var type = itemTypes.find(function(t){return t.id===item.type_id;});
    var vars = [];
    try { vars = Array.isArray(item.variants) ? item.variants : JSON.parse(item.variants||'[]'); } catch(e){}
    var isCls = item.status==='have' ? 'is-have' : item.status==='make' ? 'is-make' : 'is-buy';
    var isTxt = item.status==='have' ? 'Уже есть' : item.status==='make' ? 'Шить/делать' : 'Купить';
    var varHtml = vars.length ? '<div class="vars-strip">'
      + vars.map(function(v){
          return '<a class="var-chip'+(v.is_preferred?' pref':'')+'" href="'+esc(v.url||'#')+'" target="_blank" rel="noopener" onclick="event.stopPropagation()">'
            + esc(v.shop_name||'Магазин')
            + (v.price ? ' · <span class="var-price">'+fmtP(v.price)+'</span>' : '')
            + (v.is_preferred ? ' ⭐' : '')
            + '</a>';
        }).join('')
      + '</div>' : '';
    var thumb = (item.photos && item.photos[0])
      ? '<img src="'+esc(item.photos[0])+'" loading="lazy"/>'
      : (type && type.emoji ? type.emoji : '📦');
    return '<div class="item-card" data-id="'+item.id+'" style="animation-delay:'+idx*.03+'s">'
      + '<div class="item-inner">'
      + '<div class="item-thumb">'+thumb+'</div>'
      + '<div class="item-body">'
      + '<div class="item-name">'+esc(item.name)+'</div>'
      + (type ? '<div class="item-type">'+(type.emoji||'')+' '+esc(type.name)+'</div>' : '')
      + '<span class="item-st '+isCls+'">'+isTxt+'</span>'
      + '</div></div>'
      + varHtml + '</div>';
  }).join('');
  showContent(html);
  ge('mainContent').querySelectorAll('.item-card').forEach(function(el) {
    el.addEventListener('click', function() { openEditItem(el.dataset.id); });
  });
}

  ge('fSaveBtn').addEventListener('click', async function(){

function buildLookForm(look) {
  _editId    = look ? look.id : null;
  _refsDraft = look ? (look.refs||[]).slice() : [];
  var lookStatus = look ? look.status||'planning' : 'planning';
  openSheet(look ? 'Редактировать образ' : 'Новый образ');

  var delBtn = look ? '<button class="btn-del" id="fDelBtn">Удалить образ</button>' : '';
  ge('formBody').innerHTML =
    '<div class="fg"><label class="fl">Название *</label>'
    + '<input id="fLookName" class="fi" placeholder="Школьная форма, боевой..." value="'+esc(look?look.name:'')+'"/></div>'
    + '<div class="fg"><label class="fl">Статус</label>'
    + '<div class="pill-sel" id="fLookStatus">'
    + '<button class="pill-opt" data-v="planning">Планирую</button>'
    + '<button class="pill-opt" data-v="progress">В процессе</button>'
    + '<button class="pill-opt" data-v="ready">Готов</button>'
    + '</div></div>'
    + '<div class="fg"><label class="fl">Референс-фото</label>'
    + '<div class="refs-wrap" id="fRefsWrap"></div>'
    + '<input type="file" id="fRefInput" accept="image/*" multiple style="display:none"/></div>'
    + '<div class="fg"><label class="fl">Заметки</label>'
    + '<textarea id="fLookNotes" class="fi" placeholder="Детали, нюансы...">'+esc(look?look.notes||'':'')+'</textarea></div>'
    + '<button class="btn-save" id="fSaveBtn">Сохранить</button>'
    + delBtn;

  // status sync
  function syncStatus(){
    ge('fLookStatus').querySelectorAll('.pill-opt').forEach(function(b){
      b.className='pill-opt';
      if(b.dataset.v===lookStatus) b.classList.add('on-'+lookStatus);
    });
  }
  syncStatus();
  ge('fLookStatus').addEventListener('click', function(e){
    var b=e.target.closest('.pill-opt'); if(!b) return;
    lookStatus=b.dataset.v; syncStatus();
  });

  // refs
  function renderRefs(){
    var wrap=ge('fRefsWrap');
    wrap.innerHTML = _refsDraft.map(function(url,i){
      return '<div class="ref-thumb"><img src="'+esc(url)+'"/><div class="ref-del" data-i="'+i+'">×</div></div>';
    }).join('') + '<div class="ref-add" id="fRefAddBtn">＋</div>';
    wrap.querySelectorAll('.ref-del').forEach(function(btn){
      btn.addEventListener('click',function(){ _refsDraft.splice(+btn.dataset.i,1); renderRefs(); });
    });
    ge('fRefAddBtn').addEventListener('click',function(){ ge('fRefInput').click(); });
  }
  renderRefs();

  ge('fRefInput').addEventListener('change', function(e){
    var files=Array.from(e.target.files);
    files.forEach(function(f){
      var rd=new FileReader(); rd.onload=function(ev){ _refsDraft.push(ev.target.result); renderRefs(); }; rd.readAsDataURL(f);
    });
    // if real Supabase — upload
    if (!DEMO) {
      files.forEach(async function(f){
        try { var url=await uploadFile(f,'refs'); _refsDraft[_refsDraft.length-1]=url; renderRefs(); } catch(e){}
      });
    }
  });

  ge('fSaveBtn').addEventListener('click', async function(){
    var name=ge('fLookName').value.trim();
    if(!name){toast('Введи название','err');return;}
    ge('fSaveBtn').disabled=true; ge('fSaveBtn').textContent='Сохранение...';
    try{
      await saveLook({name:name,status:lookStatus,notes:ge('fLookNotes').value.trim()||null,refs:_refsDraft,main_ref_index:0},_editId);
      await loadLooks(curChar.id); renderLooks(); closeSheet(); toast(look?'Обновлено ✓':'Добавлено ✓','ok');
    }catch(e){toast('Ошибка: '+e.message,'err');}
    finally{ ge('fSaveBtn')&&(ge('fSaveBtn').disabled=false,ge('fSaveBtn').textContent='Сохранить'); }
  });

  if(look) ge('fDelBtn').addEventListener('click', async function(){
    if(!confirm('Удалить образ?')) return;
    try{ await deleteLook(look.id); await loadLooks(curChar.id); renderLooks(); closeSheet(); toast('Удалено','ok'); }
    catch(e){ toast('Ошибка: '+e.message,'err'); }
  });
}

      btn.addEventListener('click',function(){ _variantsDraft.splice(+btn.dataset.i,1); renderVars(); });
    });
    ed.querySelectorAll('input').forEach(function(inp){
      inp.addEventListener('input',function(){
        var i=+inp.dataset.i, f=inp.dataset.f;
        _variantsDraft[i][f] = f==='price' ? (parseFloat(inp.value)||null) : inp.value;
      });
    });
  }
  renderVars();
  ge('fAddVar').addEventListener('click',function(){
    _variantsDraft.push({shop_name:'',url:'',price:null,is_preferred:false}); renderVars();
  });

  ge('fSaveBtn').addEventListener('click', async function(){
    var name=ge('fItemName').value.trim(); if(!name){toast('Введи название','err');return;}
    ge('fSaveBtn').disabled=true; ge('fSaveBtn').textContent='Сохранение...';
    try{
      var photo=_photoUrl;
      if(_photoFile) photo=await uploadFile(_photoFile,'items');
      await saveItem({name:name,type_id:ge('fItemType').value||null,status:itemStatus,notes:ge('fItemNotes').value.trim()||null,photos:photo?[photo]:[],variants:_variantsDraft},_editId);
      await loadItems(curLook.id); renderItems(); closeSheet(); toast(item?'Обновлено ✓':'Добавлено ✓','ok');
    }catch(e){toast('Ошибка: '+e.message,'err');}
    finally{ ge('fSaveBtn')&&(ge('fSaveBtn').disabled=false,ge('fSaveBtn').textContent='Сохранить'); }
  });

  if(item) ge('fDelBtn').addEventListener('click', async function(){
    if(!confirm('Удалить предмет?')) return;
    try{ await deleteItem(item.id); await loadItems(curLook.id); renderItems(); closeSheet(); toast('Удалено','ok'); }
    catch(e){ toast('Ошибка: '+e.message,'err'); }
  });
}
