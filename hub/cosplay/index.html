<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#0a0a0f"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>Косплей</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:     #0a0a0f;
      --s1:     #111118;
      --s2:     #18181f;
      --s3:     #22222c;
      --border: #2c2c38;
      --text:   #f0eeff;
      --muted:  #585870;
      --dim:    #8080a0;
      --pink:   #ff6eb4;
      --purple: #a78bfa;
      --cyan:   #67e8f9;
      --green:  #86efac;
      --orange: #fb923c;
      --danger: #f87171;
      --r:      12px;
      --rL:     22px;
      --ff:     'Syne', sans-serif;
      --fb:     'Golos Text', sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden;background:var(--bg)}
    body{font-family:var(--fb);color:var(--text);-webkit-font-smoothing:antialiased;font-size:15px}
    button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
    input,textarea{font-family:inherit;color:inherit;background:none;border:none;outline:none}

    /* ── APP ── */
    #app{display:flex;flex-direction:column;height:100dvh}

    /* ── NAV BREADCRUMB ── */
    .nav{
      flex-shrink:0;
      padding:calc(env(safe-area-inset-top,0px) + 10px) 16px 0;
      display:flex;align-items:center;gap:6px;min-height:44px;
    }
    .nav-back{
      width:34px;height:34px;border-radius:10px;
      background:var(--s2);border:1px solid var(--border);
      display:flex;align-items:center;justify-content:center;
      font-size:16px;transition:background .15s,transform .1s;flex-shrink:0;
    }
    .nav-back:active{transform:scale(.9)}
    .nav-crumb{
      flex:1;display:flex;align-items:center;gap:4px;
      font-family:var(--ff);font-size:13px;font-weight:600;color:var(--muted);
      overflow:hidden;
    }
    .nav-crumb .sep{color:var(--border)}
    .nav-crumb .cur{color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .nav-actions{display:flex;gap:6px;flex-shrink:0}
    .icon-btn{
      width:34px;height:34px;border-radius:10px;
      background:var(--s2);border:1px solid var(--border);
      display:flex;align-items:center;justify-content:center;
      font-size:15px;transition:background .15s,transform .1s;
    }
    .icon-btn:active{transform:scale(.9)}

    /* ── PAGE HEADER ── */
    .page-hdr{
      flex-shrink:0;padding:10px 16px 12px;
    }
    .page-title{
      font-family:var(--ff);font-size:24px;font-weight:800;letter-spacing:-.5px;line-height:1.1;
    }
    .page-title em{font-style:normal;background:linear-gradient(90deg,var(--pink),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .page-sub{font-size:13px;color:var(--muted);margin-top:3px}

    /* ── SCROLL ── */
    .scroll{flex:1;overflow-y:auto;padding:4px 16px 100px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
    .scroll::-webkit-scrollbar{width:3px}
    .scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

    /* ── LOADING / EMPTY ── */
    .center{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;height:220px;color:var(--muted)}
    .spinner{width:26px;height:26px;border:2px solid var(--border);border-top-color:var(--pink);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .empty-ico{font-size:48px}
    .empty-txt{font-family:var(--ff);font-size:13px}

    /* ── CHARACTER CARDS ── */
    .char-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .char-card{
      background:var(--s1);border:1px solid var(--border);border-radius:var(--rL);
      overflow:hidden;cursor:pointer;transition:border-color .2s,transform .15s;
      animation:pop .25s cubic-bezier(.16,1,.3,1) both;
      position:relative;
    }
    .char-card:active{transform:scale(.95)}
    .char-card:hover{border-color:var(--purple)}
    @keyframes pop{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}

    .char-cover{
      width:100%;aspect-ratio:3/4;background:var(--s3);
      display:flex;align-items:center;justify-content:center;font-size:40px;
      position:relative;overflow:hidden;
    }
    .char-cover img{width:100%;height:100%;object-fit:cover}
    .char-cover-gradient{
      position:absolute;bottom:0;left:0;right:0;height:60%;
      background:linear-gradient(to top,rgba(10,10,15,.95),transparent);
    }
    .char-cover-info{
      position:absolute;bottom:0;left:0;right:0;padding:10px 12px;
    }
    .char-name{font-family:var(--ff);font-size:14px;font-weight:700;line-height:1.2}
    .char-stats{font-size:11px;color:var(--dim);margin-top:2px;display:flex;gap:8px}
    .char-prog{
      position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--s3);
    }
    .char-prog-fill{height:100%;background:linear-gradient(90deg,var(--pink),var(--purple));border-radius:0 3px 3px 0;transition:width .4s}

    /* ── LOOKS LIST ── */
    .look-card{
      display:flex;align-items:center;gap:12px;
      background:var(--s1);border:1px solid var(--border);border-radius:var(--r);
      overflow:hidden;cursor:pointer;margin-bottom:8px;
      transition:border-color .15s,transform .1s;
      animation:slideR .22s cubic-bezier(.16,1,.3,1) both;
    }
    .look-card:active{transform:scale(.98)}
    @keyframes slideR{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}

    .look-thumb{
      width:80px;height:80px;flex-shrink:0;background:var(--s3);
      display:flex;align-items:center;justify-content:center;font-size:28px;overflow:hidden;
    }
    .look-thumb img{width:100%;height:100%;object-fit:cover}
    .look-body{flex:1;min-width:0;padding:12px 12px 12px 0}
    .look-name{font-family:var(--ff);font-size:15px;font-weight:700;margin-bottom:4px;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .look-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .status-chip{
      padding:3px 10px;border-radius:100px;font-size:11px;font-weight:700;font-family:var(--ff);
    }
    .sc-planning{background:rgba(107,114,128,.15);color:#9ca3af}
    .sc-progress{background:rgba(251,146,60,.15);color:var(--orange)}
    .sc-ready{background:rgba(134,239,172,.15);color:var(--green)}
    .look-items-count{font-size:12px;color:var(--muted)}
    .look-progress{height:3px;background:var(--s3);margin-top:8px;border-radius:3px;overflow:hidden}
    .look-progress-fill{height:100%;background:linear-gradient(90deg,var(--pink),var(--purple));border-radius:3px;transition:width .4s}

    /* ── ITEMS LIST ── */
    .item-card{
      background:var(--s1);border:1px solid var(--border);border-radius:var(--r);
      margin-bottom:8px;cursor:pointer;overflow:hidden;
      transition:border-color .15s,transform .1s;
      animation:pop .2s cubic-bezier(.16,1,.3,1) both;
    }
    .item-card:active{transform:scale(.985)}
    .item-card-inner{display:flex;align-items:flex-start;gap:12px;padding:12px}
    .item-thumb{
      width:62px;height:62px;flex-shrink:0;border-radius:10px;background:var(--s3);
      display:flex;align-items:center;justify-content:center;font-size:24px;overflow:hidden;
    }
    .item-thumb img{width:100%;height:100%;object-fit:cover}
    .item-body{flex:1;min-width:0}
    .item-name{font-family:var(--ff);font-size:14px;font-weight:700;margin-bottom:3px;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .item-type{font-size:12px;color:var(--muted);margin-bottom:5px}
    .item-status-row{display:flex;align-items:center;gap:8px}
    .item-status{padding:3px 10px;border-radius:100px;font-size:11px;font-weight:700;font-family:var(--ff)}
    .is-have{background:rgba(134,239,172,.12);color:var(--green)}
    .is-buy{background:rgba(167,139,250,.12);color:var(--purple)}
    .is-make{background:rgba(103,232,249,.12);color:var(--cyan)}
    /* shop variants strip */
    .variants-strip{
      display:flex;gap:6px;padding:0 12px 10px;overflow-x:auto;scrollbar-width:none;
    }
    .variants-strip::-webkit-scrollbar{display:none}
    .variant-chip{
      flex-shrink:0;display:flex;align-items:center;gap:5px;
      padding:5px 10px;border-radius:8px;background:var(--s2);border:1px solid var(--border);
      font-size:12px;color:var(--dim);text-decoration:none;transition:border-color .15s,color .15s;
    }
    .variant-chip:hover{border-color:var(--purple);color:var(--text)}
    .variant-chip.preferred{border-color:var(--pink);color:var(--pink)}
    .variant-price{font-weight:700;font-family:'JetBrains Mono',monospace}

    /* ── FAB ── */
    .fab{
      position:fixed;bottom:calc(20px + env(safe-area-inset-bottom,0));right:18px;
      width:54px;height:54px;border-radius:50%;
      background:linear-gradient(135deg,var(--pink),var(--purple));
      color:#fff;font-size:24px;
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 4px 24px rgba(255,110,180,.35);
      transition:transform .15s,box-shadow .15s;z-index:20;
    }
    .fab:active{transform:scale(.9)}

    /* ── OVERLAY & SHEET ── */
    .overlay{
      position:fixed;inset:0;background:rgba(0,0,0,.75);
      z-index:100;opacity:0;pointer-events:none;
      transition:opacity .25s;backdrop-filter:blur(8px);
    }
    .overlay.on{opacity:1;pointer-events:all}
    .sheet{
      position:fixed;bottom:0;left:0;right:0;
      background:var(--s1);border-radius:var(--rL) var(--rL) 0 0;
      border-top:1px solid var(--border);
      z-index:101;max-height:94dvh;display:flex;flex-direction:column;
      transform:translateY(100%);transition:transform .32s cubic-bezier(.16,1,.3,1);
    }
    .sheet.on{transform:translateY(0)}
    .sheet-drag{width:36px;height:4px;background:var(--border);border-radius:4px;margin:12px auto 0;flex-shrink:0}
    .sheet-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 10px;flex-shrink:0}
    .sheet-title{font-family:var(--ff);font-size:16px;font-weight:700}
    .close-btn{
      width:30px;height:30px;border-radius:8px;background:var(--s3);
      display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:16px;
    }
    .sheet-scroll{overflow-y:auto;padding:0 18px 44px;flex:1;scrollbar-width:thin;scrollbar-color:var(--border) transparent}

    /* ── FORM ── */
    .fg{margin-bottom:14px}
    .fl{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;font-family:var(--ff)}
    .fi{width:100%;padding:11px 13px;background:var(--s2);border:1px solid var(--border);border-radius:var(--r);font-size:14px;color:var(--text);transition:border-color .15s}
    .fi:focus{border-color:var(--purple)}
    .fi::placeholder{color:var(--muted)}
    textarea.fi{resize:vertical;min-height:70px}
    .frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    select.fi{cursor:pointer;appearance:none}

    .img-up{
      width:100%;height:130px;border-radius:var(--r);
      border:1.5px dashed var(--border);background:var(--s2);
      display:flex;align-items:center;justify-content:center;
      gap:8px;color:var(--muted);font-size:13px;cursor:pointer;
      position:relative;overflow:hidden;transition:border-color .15s;
    }
    .img-up:hover{border-color:var(--purple)}
    .img-up img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
    .img-mask{position:absolute;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;font-size:13px;opacity:0;transition:opacity .15s}
    .img-up:hover .img-mask{opacity:1}
    #imgInputA,#imgInputB{display:none}

    /* status pills selector */
    .pill-sel{display:flex;gap:6px;flex-wrap:wrap}
    .pill-opt{
      padding:8px 14px;border-radius:100px;font-size:12px;font-weight:700;
      border:1px solid var(--border);background:var(--s2);color:var(--muted);
      transition:all .15s;cursor:pointer;font-family:var(--ff);
    }
    .pill-opt.on-planning{background:rgba(107,114,128,.15);color:#9ca3af;border-color:#4b5563}
    .pill-opt.on-progress{background:rgba(251,146,60,.15);color:var(--orange);border-color:var(--orange)}
    .pill-opt.on-ready{background:rgba(134,239,172,.15);color:var(--green);border-color:var(--green)}
    .pill-opt.on-have{background:rgba(134,239,172,.12);color:var(--green);border-color:var(--green)}
    .pill-opt.on-buy{background:rgba(167,139,250,.12);color:var(--purple);border-color:var(--purple)}
    .pill-opt.on-make{background:rgba(103,232,249,.12);color:var(--cyan);border-color:var(--cyan)}

    /* variants editor */
    .variants-editor{display:flex;flex-direction:column;gap:8px}
    .variant-row{
      display:flex;align-items:center;gap:8px;padding:10px 12px;
      background:var(--s2);border:1px solid var(--border);border-radius:var(--r);
      position:relative;
    }
    .variant-row.pref{border-color:var(--pink)}
    .variant-fields{flex:1;display:flex;flex-direction:column;gap:6px}
    .variant-fields input{font-size:13px;background:var(--s3);padding:6px 10px;border-radius:8px;border:1px solid var(--border);color:var(--text);width:100%}
    .variant-fields input:focus{border-color:var(--purple);outline:none}
    .variant-right{display:flex;flex-direction:column;align-items:center;gap:6px;flex-shrink:0}
    .star-btn{font-size:18px;opacity:.4;transition:opacity .15s,transform .15s}
    .star-btn.on{opacity:1;transform:scale(1.1)}
    .del-var{font-size:18px;color:var(--muted);padding:2px;transition:color .15s}
    .del-var:hover{color:var(--danger)}
    .btn-add-var{
      width:100%;padding:10px;border:1.5px dashed var(--border);border-radius:var(--r);
      font-size:13px;font-weight:600;color:var(--muted);transition:all .15s;
    }
    .btn-add-var:hover{border-color:var(--purple);color:var(--purple)}

    /* refs (look photos) */
    .refs-wrap{display:flex;gap:8px;flex-wrap:wrap}
    .ref-thumb{
      width:70px;height:70px;border-radius:10px;overflow:hidden;position:relative;
      background:var(--s3);flex-shrink:0;
    }
    .ref-thumb img{width:100%;height:100%;object-fit:cover}
    .ref-del{
      position:absolute;top:2px;right:2px;width:18px;height:18px;
      background:rgba(0,0,0,.7);border-radius:50%;display:flex;align-items:center;justify-content:center;
      font-size:11px;color:#fff;cursor:pointer;
    }
    .ref-add{
      width:70px;height:70px;border-radius:10px;
      border:1.5px dashed var(--border);background:var(--s2);
      display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--muted);cursor:pointer;
      transition:border-color .15s,color .15s;flex-shrink:0;
    }
    .ref-add:hover{border-color:var(--purple);color:var(--purple)}
    #refInput{display:none}

    /* btns */
    .btn-save{
      width:100%;padding:14px;
      background:linear-gradient(135deg,var(--pink),var(--purple));
      color:#fff;border-radius:var(--r);font-family:var(--ff);font-size:14px;font-weight:700;
      transition:transform .1s,opacity .15s;margin-top:6px;
    }
    .btn-save:active{transform:scale(.98)}
    .btn-save:disabled{opacity:.4;pointer-events:none}
    .btn-del{width:100%;padding:12px;border:1px solid rgba(248,113,113,.25);color:var(--danger);border-radius:var(--r);font-size:13px;font-weight:600;transition:background .15s;margin-top:6px}
    .btn-del:hover{background:rgba(248,113,113,.08)}

    /* toast */
    .toast{position:fixed;bottom:86px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--s2);border:1px solid var(--border);border-radius:100px;padding:9px 18px;font-size:13px;font-weight:500;white-space:nowrap;opacity:0;transition:opacity .2s,transform .2s;z-index:300;pointer-events:none}
    .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
    .toast.ok{border-color:var(--green);color:var(--green)}
    .toast.err{border-color:var(--danger);color:var(--danger)}

    /* look refs viewer */
    .refs-viewer{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;scrollbar-width:none}
    .refs-viewer::-webkit-scrollbar{display:none}
    .ref-view{width:90px;height:90px;border-radius:10px;overflow:hidden;flex-shrink:0;background:var(--s3);cursor:pointer}
    .ref-view img{width:100%;height:100%;object-fit:cover}

    /* section label */
    .section-lbl{font-family:var(--ff);font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin:16px 0 8px}
  </style>
</head>
<body>
<div id="app">
  <div class="nav" id="navBar">
    <button class="nav-back" id="backBtn" style="display:none">‹</button>
    <div class="nav-crumb" id="breadcrumb"></div>
    <div class="nav-actions">
      <button class="icon-btn" id="btnSync">⟳</button>
    </div>
  </div>

  <div class="page-hdr" id="pageHdr">
    <div class="page-title" id="pageTitle">КОС<em>ПЛЕЙ</em></div>
    <div class="page-sub" id="pageSub">Персонажи</div>
  </div>

  <div class="scroll" id="scrollArea">
    <div class="center" id="loadingEl"><div class="spinner"></div></div>
    <div id="mainContent" style="display:none"></div>
    <div class="center" id="emptyEl" style="display:none">
      <div class="empty-ico">🎭</div>
      <div class="empty-txt">Пусто</div>
    </div>
  </div>

  <button class="fab" id="fabAdd">+</button>
</div>

<div class="overlay" id="overlay"></div>

<!-- FORM SHEET — универсальный для персонажа / образа / предмета -->
<div class="sheet" id="formSheet">
  <div class="sheet-drag"></div>
  <div class="sheet-hdr">
    <div class="sheet-title" id="formTitle">Новый персонаж</div>
    <button class="close-btn" id="formClose">✕</button>
  </div>
  <div class="sheet-scroll" id="formBody"></div>
</div>

<div class="toast" id="toastEl"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
// ══════════════════════════════════════════════════
// ⚙️ КОНФИГ
// ══════════════════════════════════════════════════
const SUPABASE_URL  = 'https://wjeleewngroogzihfthv.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndqZWxlZXduZ3Jvb2d6aWhmdGh2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3OTE1NjQsImV4cCI6MjA5MzM2NzU2NH0.gsBzZ2XCNdp-iP5_cKP12d8eVISmLerhU8LUSR3BJHI';
const BUCKET        = 'media';
const DEMO          = SUPABASE_URL.includes('YOUR_PROJECT');
const sb            = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// ══════════════════════════════════════════════════
// STATE — стек навигации
// ══════════════════════════════════════════════════
// view: 'chars' | 'looks' | 'items'
let view      = 'chars';
let curChar   = null;   // {id, name, ...}
let curLook   = null;   // {id, name, ...}

let characters = [];
let looks      = [];    // для текущего персонажа
let items      = [];    // для текущего образа
let itemTypes  = [];    // cosplay_item_types

// ══════════════════════════════════════════════════
// SUPABASE CALLS
// ══════════════════════════════════════════════════
async function loadCharacters() {
  if (DEMO) { characters = demoCars(); return; }
  const { data, error } = await sb.from('cosplay_characters').select('*').order('created_at');
  if (error) { toast('Ошибка: '+error.message,'err'); return; }
  characters = data || [];
}
async function loadLooks(charId) {
  if (DEMO) { looks = demoLooks(charId); return; }
  const { data, error } = await sb.from('cosplay_looks').select('*').eq('character_id', charId).order('created_at');
  if (error) { toast('Ошибка: '+error.message,'err'); return; }
  looks = data || [];
}
async function loadItems(lookId) {
  if (DEMO) { items = demoItems(lookId); return; }
  // items linked via item_ids array on look
  const look = looks.find(l => l.id === lookId);
  if (!look || !look.item_ids || !look.item_ids.length) { items = []; return; }
  const { data, error } = await sb.from('cosplay_items').select('*').in('id', look.item_ids);
  if (error) { toast('Ошибка: '+error.message,'err'); return; }
  items = data || [];
}
async function loadItemTypes() {
  if (DEMO) { itemTypes = demoTypes(); return; }
  const { data } = await sb.from('cosplay_item_types').select('*').order('name');
  itemTypes = data || [];
}

async function saveCharacter(payload, id) {
  if (DEMO) {
    if (id) { const i = characters.findIndex(c=>c.id===id); if(i>=0) characters[i]={...characters[i],...payload}; }
    else characters.push({id: 'c'+Date.now(), created_at: new Date().toISOString(), ...payload});
    return;
  }
  if (id) { const {error}=await sb.from('cosplay_characters').update(payload).eq('id',id); if(error) throw error; }
  else     { const {error}=await sb.from('cosplay_characters').insert(payload); if(error) throw error; }
}
async function deleteCharacter(id) {
  if (DEMO) { characters=characters.filter(c=>c.id!==id); return; }
  const {error}=await sb.from('cosplay_characters').delete().eq('id',id); if(error) throw error;
}

async function saveLook(payload, id) {
  if (DEMO) {
    if (id) { const i=looks.findIndex(l=>l.id===id); if(i>=0) looks[i]={...looks[i],...payload}; }
    else looks.push({id:'l'+Date.now(), created_at: new Date().toISOString(), item_ids:[], ...payload});
    return;
  }
  if (id) { const {error}=await sb.from('cosplay_looks').update(payload).eq('id',id); if(error) throw error; }
  else     { const {error}=await sb.from('cosplay_looks').insert({...payload,character_id:curChar.id}); if(error) throw error; }
}
async function deleteLook(id) {
  if (DEMO) { looks=looks.filter(l=>l.id!==id); return; }
  const {error}=await sb.from('cosplay_looks').delete().eq('id',id); if(error) throw error;
}

async function saveCosItem(payload, id) {
  if (DEMO) {
    if (id) { const i=items.findIndex(x=>x.id===id); if(i>=0) items[i]={...items[i],...payload}; }
    else {
      const newItem = {id:'i'+Date.now(), created_at: new Date().toISOString(), ...payload};
      items.push(newItem);
      // link to look
      const l = looks.find(l=>l.id===curLook.id);
      if(l) l.item_ids = [...(l.item_ids||[]), newItem.id];
    }
    return;
  }
  let savedId = id;
  if (id) {
    const {error}=await sb.from('cosplay_items').update(payload).eq('id',id); if(error) throw error;
  } else {
    const {data,error}=await sb.from('cosplay_items').insert(payload).select().single(); if(error) throw error;
    savedId = data.id;
    // append to look.item_ids
    const look = looks.find(l=>l.id===curLook.id);
    const newIds = [...(look?.item_ids||[]), savedId];
    const {error:e2}=await sb.from('cosplay_looks').update({item_ids:newIds}).eq('id',curLook.id);
    if(e2) throw e2;
  }
}
async function deleteCosItem(id) {
  if (DEMO) {
    items = items.filter(x=>x.id!==id);
    const l = looks.find(l=>l.id===curLook.id);
    if(l) l.item_ids = (l.item_ids||[]).filter(x=>x!==id);
    return;
  }
  const {error}=await sb.from('cosplay_items').delete().eq('id',id); if(error) throw error;
  const look = looks.find(l=>l.id===curLook.id);
  const newIds = (look?.item_ids||[]).filter(x=>x!==id);
  await sb.from('cosplay_looks').update({item_ids:newIds}).eq('id',curLook.id);
}

async function uploadFile(file, folder) {
  const ext  = file.name.split('.').pop();
  const path = `cosplay/${folder}/${Date.now()}.${ext}`;
  const {error}=await sb.storage.from(BUCKET).upload(path,file,{upsert:true}); if(error) throw error;
  return sb.storage.from(BUCKET).getPublicUrl(path).data.publicUrl;
}

// NAVIGATION
// ══════════════════════════════════════════════════
function setView(v) {
  view = v;
  const back   = $('backBtn');
  const crumb  = $('breadcrumb');
  const title  = $('pageTitle');
  const sub    = $('pageSub');

  if (v === 'chars') {
    back.style.display = 'none';
    crumb.innerHTML = '';
    title.innerHTML = 'КОС<em>ПЛЕЙ</em>';
    sub.textContent = 'Персонажи';
  } else if (v === 'looks') {
    back.style.display = 'flex';
    crumb.innerHTML = `<span>${esc(curChar.name)}</span><span class="sep"> / </span><span class="cur">Образы</span>`;
    title.innerHTML = `${esc(curChar.name)}`;
    sub.textContent = 'Образы';
  } else if (v === 'items') {
    back.style.display = 'flex';
    crumb.innerHTML = `<span>${esc(curChar.name)}</span><span class="sep"> / </span><span>${esc(curLook.name)}</span><span class="sep"> / </span><span class="cur">Предметы</span>`;
    title.innerHTML = esc(curLook.name);
    sub.textContent = 'Предметы образа';
  }
}

$('backBtn').addEventListener('click', () => {
  if (view === 'items') { gotoLooks(curChar); }
  else if (view === 'looks') { gotoChars(); }
});

async function gotoChars() {
  showLoading();
  curChar = null; curLook = null;
  setView('chars');
  await loadCharacters();
  renderChars();
}
async function gotoLooks(char) {
  showLoading();
  curChar = char; curLook = null;
  setView('looks');
  await loadLooks(char.id);
  renderLooks();
}
async function gotoItems(look) {
  showLoading();
  curLook = look;
  setView('items');
  await loadItems(look.id);
  renderItems();
}

// ══════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════
function showLoading() {
  $('loadingEl').style.display='flex';
  $('mainContent').style.display='none';
  $('emptyEl').style.display='none';
}
function showContent(html) {
  $('loadingEl').style.display='none';
  if (!html) { $('emptyEl').style.display='flex'; $('mainContent').style.display='none'; return; }
  $('mainContent').innerHTML=html;
  $('mainContent').style.display='block';
  $('emptyEl').style.display='none';
}

function renderChars() {
  if (!characters.length) { showContent(''); return; }
  const html = `<div class="char-grid">${characters.map((c,idx)=>{
    const totalLooks = c.looks_count || 0;
    const prog = c.progress || 0;
    return `<div class="char-card" data-id="${c.id}" style="animation-delay:${idx*.04}s">
      <div class="char-cover">
        ${c.cover_url ? `<img src="${esc(c.cover_url)}" loading="lazy"/>` : '🎭'}
        <div class="char-cover-gradient"></div>
        <div class="char-cover-info">
          <div class="char-name">${esc(c.name)}</div>
          <div class="char-stats"><span>${totalLooks} образов</span></div>
        </div>
      </div>
      <div class="char-prog"><div class="char-prog-fill" style="width:${prog}%"></div></div>
    </div>`;
  }).join('')}</div>`;
  showContent(html);
  $('mainContent').querySelectorAll('.char-card').forEach(el => {
    el.addEventListener('click', () => gotoLooks(characters.find(c=>c.id===el.dataset.id)));
    el.addEventListener('contextmenu', e => { e.preventDefault(); openEditChar(el.dataset.id); });
  });
}

function renderLooks() {
  if (!looks.length) { showContent(''); return; }
  const html = looks.map((l,idx) => {
    const total  = (l.item_ids||[]).length;
    const prog   = l.progress || 0;
    const scCls  = l.status==='ready'?'sc-ready':l.status==='progress'?'sc-progress':'sc-planning';
    const scTxt  = l.status==='ready'?'Готов':l.status==='progress'?'В процессе':'Планирую';
    return `<div class="look-card" data-id="${l.id}" style="animation-delay:${idx*.04}s">
      <div class="look-thumb">
        ${l.refs&&l.refs[l.main_ref_index||0] ? `<img src="${esc(l.refs[l.main_ref_index||0])}" loading="lazy"/>` : '✨'}
      </div>
      <div class="look-body">
        <div class="look-name">${esc(l.name)}</div>
        <div class="look-meta">
          <span class="status-chip ${scCls}">${scTxt}</span>
          <span class="look-items-count">${total} предметов</span>
        </div>
        <div class="look-progress"><div class="look-progress-fill" style="width:${prog}%"></div></div>
      </div>
    </div>`;
  }).join('');
  showContent(html);
  $('mainContent').querySelectorAll('.look-card').forEach(el => {
    el.addEventListener('click',  () => gotoItems(looks.find(l=>l.id===el.dataset.id)));
    el.addEventListener('contextmenu', e => { e.preventDefault(); openEditLook(el.dataset.id); });
  });
}

function renderItems() {
  if (!items.length) { showContent(''); return; }
  const html = items.map((item,idx) => {
    const type    = itemTypes.find(t=>t.id===item.type_id);
    const variants= Array.isArray(item.variants) ? item.variants : (typeof item.variants==='string'?JSON.parse(item.variants||'[]'):[]);
    const isCls   = item.status==='have'?'is-have':item.status==='make'?'is-make':'is-buy';
    const isTxt   = item.status==='have'?'Есть':item.status==='make'?'Шить/делать':'Купить';
    const varHtml = variants.length ? `<div class="variants-strip">${variants.map(v=>`
      <a class="variant-chip ${v.is_preferred?'preferred':''}" href="${esc(v.url||'#')}" target="_blank" rel="noopener" onclick="event.stopPropagation()">
        ${v.shop_name||'Магазин'}${v.price?` · <span class="variant-price">${fmtP(v.price)}</span>`:''}
        ${v.is_preferred?'⭐':''}
      </a>`).join('')}</div>` : '';
    return `<div class="item-card" data-id="${item.id}" style="animation-delay:${idx*.03}s">
      <div class="item-card-inner">
        <div class="item-thumb">
          ${item.photos&&item.photos[0]?`<img src="${esc(item.photos[0])}" loading="lazy"/>`:(type?.emoji||'📦')}
        </div>
        <div class="item-body">
          <div class="item-name">${esc(item.name)}</div>
          ${type?`<div class="item-type">${type.emoji||''} ${esc(type.name)}</div>`:''}
          <div class="item-status-row">
            <span class="item-status ${isCls}">${isTxt}</span>
          </div>
        </div>
      </div>
      ${varHtml}
    </div>`;
  }).join('');
  showContent(html);
  $('mainContent').querySelectorAll('.item-card').forEach(el => {
    el.addEventListener('click', () => openEditItem(el.dataset.id));
  });
}

let _formMode = null; // 'char' | 'look' | 'item'
let _editId   = null;
let _variantsDraft = [];
let _refsDraft     = [];
let _coverFile = null, _coverUrl = null;
let _photoFile = null, _photoUrl = null;

function openSheet() {
  $('overlay').classList.add('on');
  $('formSheet').classList.add('on');
  document.body.style.overflow='hidden';
}
function closeSheet() {
  $('overlay').classList.remove('on');
  $('formSheet').classList.remove('on');
  document.body.style.overflow='';
  _formMode=null; _editId=null;
  _variantsDraft=[]; _refsDraft=[];
  _coverFile=null; _coverUrl=null;

}

$('formClose').addEventListener('click', closeSheet);

// ─── CHARACTER FORM ───
function openAddChar()  { buildCharForm(null); }
function openEditChar(id) {
  const c = characters.find(x=>x.id===id);
  if(c) buildCharForm(c);
}
function buildCharForm(char) {
  _formMode='char'; _editId=char?.id||null;
  _coverUrl = char?.cover_url||null;
  $('formTitle').textContent = char ? 'Редактировать персонажа' : 'Новый персонаж';
  $('formBody').innerHTML = `
    <div class="fg">
      <label class="fl">Обложка</label>
      <div class="img-up" id="coverUp">
        <span id="coverUpLbl">🎭 Добавить фото</span>
        ${_coverUrl?`<img src="${esc(_coverUrl)}"/>`:''}
        <div class="img-mask">🔄 Заменить</div>
      </div>
      <input type="file" id="imgInputA" accept="image/*"/>
    </div>
    <div class="fg">
      <label class="fl">Имя персонажа *</label>
      <input id="fCharName" class="fi" placeholder="Например: Nezuko Kamado" value="${esc(char?.name||'')}"/>
    </div>
    <div class="fg">
      <label class="fl">Заметки</label>
      <textarea id="fCharNotes" class="fi" placeholder="Источник, аниме/игра...">${esc(char?.notes||'')}</textarea>
    </div>
    <button class="btn-save" id="btnSave">Сохранить</button>
    ${char?`<button class="btn-del" id="btnDel">Удалить персонажа</button>`:''}`;

  setupImgUp('coverUp','imgInputA','cover');
  if(_coverUrl) { $('coverUp').querySelector('img') || ($('coverUp').insertAdjacentHTML('beforeend',`<img src="${esc(_coverUrl)}">`)); $('coverUpLbl').style.display='none'; }

  $('btnSave').addEventListener('click', async () => {
    const name = $('fCharName').value.trim();
    if(!name){toast('Введи имя','err');return;}
    setLoading(true);
    try {
      let cover = _coverUrl;
      if(_coverFile) cover = await uploadFile(_coverFile,'chars');
      await saveCharacter({name, notes:$('fCharNotes').value.trim()||null, cover_url:cover||null}, _editId);
      await loadCharacters(); renderChars(); closeSheet(); toast(char?'Обновлено ✓':'Добавлено ✓','ok');
    } catch(e){toast('Ошибка: '+e.message,'err');}
    finally{setLoading(false);}
  });
  if(char) $('btnDel')?.addEventListener('click', async()=>{
    if(!confirm('Удалить персонажа и все его образы?')) return;

}

// ─── LOOK FORM ───
function openAddLook()  { buildLookForm(null); }
function openEditLook(id) { buildLookForm(looks.find(l=>l.id===id)||null); }
function buildLookForm(look) {
  _formMode='look'; _editId=look?.id||null;
  _refsDraft = [...(look?.refs||[])];
  let lookStatus = look?.status||'planning';

  $('formTitle').textContent = look ? 'Редактировать образ' : 'Новый образ';
  $('formBody').innerHTML = `
    <div class="fg">
      <label class="fl">Название образа *</label>
      <input id="fLookName" class="fi" placeholder="Школьная форма, боевой..." value="${esc(look?.name||'')}"/>
    </div>
    <div class="fg">
      <label class="fl">Статус</label>
      <div class="pill-sel" id="lookStatusSel">
        <button class="pill-opt" data-v="planning">Планирую</button>
        <button class="pill-opt" data-v="progress">В процессе</button>
        <button class="pill-opt" data-v="ready">Готов</button>
      </div>
    </div>
    <div class="fg">
      <label class="fl">Референс-фото</label>
      <div class="refs-wrap" id="refsWrap"></div>
      <input type="file" id="refInput" accept="image/*" multiple/>
    </div>
    <div class="fg">
      <label class="fl">Заметки</label>
      <textarea id="fLookNotes" class="fi" placeholder="Описание, детали...">${esc(look?.notes||'')}</textarea>
    </div>
    <button class="btn-save" id="btnSave">Сохранить</button>
    ${look?`<button class="btn-del" id="btnDel">Удалить образ</button>`:''}`;

  // status pills
  const syncLookStatus = () => {
    $('lookStatusSel').querySelectorAll('.pill-opt').forEach(b=>{
      b.className='pill-opt';
      if(b.dataset.v===lookStatus) b.classList.add(`on-${lookStatus}`);
    });
  };
  syncLookStatus();
  $('lookStatusSel').addEventListener('click', e=>{
    const b=e.target.closest('.pill-opt'); if(!b) return;
    lookStatus=b.dataset.v; syncLookStatus();
  });

  // refs
  const renderRefs = () => {
    const wrap = $('refsWrap');
    wrap.innerHTML = _refsDraft.map((url,i)=>`
      <div class="ref-thumb">
        <img src="${esc(url)}"/>
        <div class="ref-del" data-i="${i}">×</div>
      </div>`).join('') + `<div class="ref-add" id="refAddBtn">＋</div>`;
    wrap.querySelectorAll('.ref-del').forEach(btn=>{
      btn.addEventListener('click',()=>{_refsDraft.splice(+btn.dataset.i,1);renderRefs();});
    });
    $('refAddBtn').addEventListener('click',()=>$('refInput').click());
  };
  renderRefs();
  $('refInput').addEventListener('change', async e=>{
    const files=[...e.target.files]; if(!files.length) return;
    if(!DEMO) {
      for(const f of files){ const url=await uploadFile(f,'refs'); _refsDraft.push(url); }
    } else {
      files.forEach(f=>{const r=new FileReader();r.onload=ev=>{_refsDraft.push(ev.target.result);renderRefs();};r.readAsDataURL(f);});
    }
    if(!DEMO) renderRefs();
  });

  $('btnSave').addEventListener('click', async()=>{
    const name=$('fLookName').value.trim(); if(!name){toast('Введи название','err');return;}
    setLoading(true);
    try{
      await saveLook({name,status:lookStatus,notes:$('fLookNotes').value.trim()||null,refs:_refsDraft,main_ref_index:0},_editId);
      await loadLooks(curChar.id); renderLooks(); closeSheet(); toast(look?'Обновлено ✓':'Добавлено ✓','ok');
    }catch(e){toast('Ошибка: '+e.message,'err');}
    finally{setLoading(false);}
  });
  if(look) $('btnDel')?.addEventListener('click',async()=>{
    if(!confirm('Удалить образ?')) return;
    try{await deleteLook(look.id);await loadLooks(curChar.id);renderLooks();closeSheet();toast('Удалено','ok');}
    catch(e){toast('Ошибка: '+e.message,'err');}
  });
  openSheet();
}

  renderVars();
  $('btnAddVar').addEventListener('click',()=>{_variantsDraft.push({shop_name:'',url:'',price:null,is_preferred:false});renderVars();});

  $('btnSave').addEventListener('click',async()=>{
    const name=$('fItemName').value.trim(); if(!name){toast('Введи название','err');return;}
    setLoading(true);
    try{
      let photo=_photoUrl;
      if(_photoFile) photo=await uploadFile(_photoFile,'items');
      await saveCosItem({
        name,
        type_id:$('fItemType').value||null,
        status:itemStatus,
        notes:$('fItemNotes').value.trim()||null,
        photos:photo?[photo]:[],
        variants:_variantsDraft,
      },_editId);
      await loadItems(curLook.id); renderItems(); closeSheet(); toast(item?'Обновлено ✓':'Добавлено ✓','ok');
    }catch(e){toast('Ошибка: '+e.message,'err');}
    finally{setLoading(false);}
  });
  if(item) $('btnDel')?.addEventListener('click',async()=>{
    if(!confirm('Удалить предмет?')) return;
    try{await deleteCosItem(item.id);await loadItems(curLook.id);renderItems();closeSheet();toast('Удалено','ok');}
    catch(e){toast('Ошибка: '+e.message,'err');}
  });
  openSheet();
}

// shared image upload helper
function setupImgUp(upId, inputId, folder) {
  const up = $(upId); if(!up) return;
  up.addEventListener('click',()=>$(inputId).click());
  $(inputId).addEventListener('change',e=>{
    const f=e.target.files[0]; if(!f) return;
    if(folder==='cover') _coverFile=f;
    else _photoFile=f;
    const r=new FileReader();
    r.onload=ev=>{
      let img=up.querySelector('img');
      if(!img){img=document.createElement('img');up.appendChild(img);}
      img.src=ev.target.result;img.style.display='block';
      const lbl=up.querySelector('span'); if(lbl) lbl.style.display='none';
    };
    r.readAsDataURL(f);
  });
}

function setLoading(on) {
  const btn = $('btnSave'); if(!btn) return;
  btn.disabled=on; btn.textContent=on?'Сохранение...':'Сохранить';
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtP(n){return Number(n).toLocaleString('ru-RU')+' ₽';}
let _tt;
function toast(msg,type=''){
  const el=$('toastEl');
  el.textContent=msg;el.className='toast on '+(type||'');
  clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('on'),2500);
}
