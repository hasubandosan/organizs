<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f0f0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Покупки</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;600;800&family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    /* ── TOKENS ─────────────────────────────── */
    :root {
      --bg:       #0f0f0f;
      --surface:  #181818;
      --card:     #1e1e1e;
      --border:   #2a2a2a;
      --accent:   #e8ff47;
      --accent2:  #ff6b47;
      --text:     #f0f0f0;
      --muted:    #666;
      --danger:   #ff4747;

      --r-sm: 10px;
      --r-md: 16px;
      --r-lg: 24px;

      --font-display: 'Unbounded', sans-serif;
      --font-body:    'Golos Text', sans-serif;

      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* ── RESET ──────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      -webkit-font-smoothing: antialiased;
    }
    button { font-family: inherit; cursor: pointer; border: none; background: none; }
    input, textarea, select { font-family: inherit; color: inherit; background: none; border: none; outline: none; }
    a { color: inherit; text-decoration: none; }

    /* ── LAYOUT ─────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    /* ── HEADER ─────────────────────────────── */
    .header {
      flex-shrink: 0;
      padding: 20px 20px 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-title {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
      flex: 1;
    }
    .header-title span { color: var(--accent); }
    .btn-icon {
      width: 40px; height: 40px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 18px;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-icon:active { transform: scale(0.92); }

    /* ── FILTERS ─────────────────────────────── */
    .filters-wrap {
      flex-shrink: 0;
      padding: 16px 20px 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .search-box {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 10px 14px;
    }
    .search-box svg { color: var(--muted); flex-shrink: 0; }
    .search-box input { flex: 1; font-size: 15px; color: var(--text); }
    .search-box input::placeholder { color: var(--muted); }

    .filter-tabs {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 2px;
    }
    .filter-tabs::-webkit-scrollbar { display: none; }
    .tab {
      flex-shrink: 0;
      padding: 6px 14px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 500;
      border: 1px solid var(--border);
      color: var(--muted);
      background: var(--card);
      transition: all 0.15s;
    }
    .tab.active {
      background: var(--accent);
      color: #0f0f0f;
      border-color: var(--accent);
      font-weight: 600;
    }

    /* ── STATS BAR ───────────────────────────── */
    .stats-bar {
      flex-shrink: 0;
      display: flex;
      gap: 8px;
      padding: 12px 20px 0;
    }
    .stat-chip {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .stat-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-family: var(--font-display);
      font-weight: 400;
    }
    .stat-value {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 600;
    }
    .stat-value.accent { color: var(--accent); }
    .stat-value.accent2 { color: var(--accent2); }

    /* ── LIST ────────────────────────────────── */
    .list-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 14px 20px 100px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .list-wrap::-webkit-scrollbar { width: 4px; }
    .list-wrap::-webkit-scrollbar-track { background: transparent; }
    .list-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      height: 200px;
      color: var(--muted);
    }
    .empty-state .big-icon { font-size: 48px; }
    .empty-state p { font-family: var(--font-display); font-size: 13px; }

    /* ── ITEM CARD ───────────────────────────── */
    .item-card {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 14px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.1s;
      animation: slideIn 0.25s var(--ease-out) both;
      position: relative;
      overflow: hidden;
    }
    .item-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      border-radius: 3px 0 0 3px;
      background: transparent;
      transition: background 0.15s;
    }
    .item-card.status-ordered::before { background: var(--accent2); }
    .item-card.status-done::before   { background: var(--accent); }
    .item-card:active { transform: scale(0.98); }
    .item-card:hover { border-color: #3a3a3a; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item-img {
      width: 60px; height: 60px;
      border-radius: var(--r-sm);
      object-fit: cover;
      background: var(--border);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      overflow: hidden;
    }
    .item-img img { width: 100%; height: 100%; object-fit: cover; }

    .item-body { flex: 1; min-width: 0; }
    .item-name {
      font-weight: 600;
      font-size: 15px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }
    .item-card.status-done .item-name {
      text-decoration: line-through;
      color: var(--muted);
    }
    .item-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .item-price {
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
    }
    .item-category {
      font-size: 12px;
      color: var(--muted);
    }
    .item-tags {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-top: 6px;
    }
    .tag-pill {
      padding: 2px 8px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 500;
      background: #2a2a2a;
      color: var(--muted);
    }

    .item-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
      flex-shrink: 0;
    }
    .priority-badge {
      font-family: var(--font-display);
      font-size: 10px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 100px;
      letter-spacing: 0.5px;
    }
    .priority-high   { background: rgba(255, 71, 71, 0.15); color: var(--danger); }
    .priority-medium { background: rgba(232, 255, 71, 0.12); color: var(--accent); }
    .priority-low    { background: rgba(255,255,255,0.05); color: var(--muted); }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
    }
    .status-dot.ordered { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); }
    .status-dot.done    { background: var(--accent); }

    /* ── FAB ─────────────────────────────────── */
    .fab {
      position: fixed;
      bottom: 24px;
      right: 20px;
      width: 56px; height: 56px;
      border-radius: 50%;
      background: var(--accent);
      color: #0f0f0f;
      font-size: 26px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 24px rgba(232, 255, 71, 0.35);
      transition: transform 0.15s, box-shadow 0.15s;
      z-index: 10;
    }
    .fab:active { transform: scale(0.92); box-shadow: 0 2px 12px rgba(232, 255, 71, 0.2); }

    /* ── BOTTOM SHEET ────────────────────────── */
    .sheet-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.65);
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
      backdrop-filter: blur(4px);
    }
    .sheet-overlay.open { opacity: 1; pointer-events: all; }

    .sheet {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-radius: var(--r-lg) var(--r-lg) 0 0;
      border-top: 1px solid var(--border);
      z-index: 101;
      max-height: 92dvh;
      display: flex;
      flex-direction: column;
      transform: translateY(100%);
      transition: transform 0.35s var(--ease-out);
    }
    .sheet.open { transform: translateY(0); }

    .sheet-handle {
      width: 36px; height: 4px;
      background: var(--border);
      border-radius: 4px;
      margin: 12px auto 0;
      flex-shrink: 0;
    }
    .sheet-head {
      padding: 16px 20px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .sheet-title {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 700;
    }
    .btn-close {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      background: var(--card);
      color: var(--muted);
      font-size: 18px;
      transition: color 0.15s;
    }
    .btn-close:hover { color: var(--text); }

    .sheet-body {
      overflow-y: auto;
      padding: 0 20px 40px;
      flex: 1;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    /* ── FORM ────────────────────────────────── */
    .form-group {
      margin-bottom: 16px;
    }
    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
      font-family: var(--font-display);
    }
    .form-input {
      width: 100%;
      padding: 12px 14px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      font-size: 15px;
      color: var(--text);
      transition: border-color 0.15s;
    }
    .form-input:focus { border-color: var(--accent); }
    .form-input::placeholder { color: var(--muted); }
    textarea.form-input { resize: vertical; min-height: 80px; }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .priority-selector {
      display: flex;
      gap: 8px;
    }
    .priority-btn {
      flex: 1;
      padding: 10px;
      border-radius: var(--r-sm);
      font-size: 13px;
      font-weight: 600;
      font-family: var(--font-display);
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--muted);
      transition: all 0.15s;
      text-align: center;
    }
    .priority-btn.active-high   { background: rgba(255,71,71,0.15); color: var(--danger); border-color: var(--danger); }
    .priority-btn.active-medium { background: rgba(232,255,71,0.12); color: var(--accent); border-color: var(--accent); }
    .priority-btn.active-low    { background: rgba(255,255,255,0.06); color: var(--text); border-color: #444; }

    .status-selector {
      display: flex;
      gap: 8px;
    }
    .status-btn {
      flex: 1;
      padding: 10px;
      border-radius: var(--r-sm);
      font-size: 13px;
      font-weight: 600;
      font-family: var(--font-display);
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--muted);
      transition: all 0.15s;
      text-align: center;
    }
    .status-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(232,255,71,0.08);
    }

    /* image upload preview */
    .img-preview-wrap {
      position: relative;
      width: 100%;
      height: 140px;
      border-radius: var(--r-md);
      border: 1.5px dashed var(--border);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      background: var(--card);
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .img-preview-wrap:hover { border-color: var(--accent); }
    .img-preview-wrap img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .img-preview-wrap .img-overlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .img-preview-wrap:hover .img-overlay { opacity: 1; }
    #imgFileInput { display: none; }

    .tags-input-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 10px 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      min-height: 44px;
      cursor: text;
      transition: border-color 0.15s;
    }
    .tags-input-wrap:focus-within { border-color: var(--accent); }
    .tag-chip {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px 3px 10px;
      background: rgba(232,255,71,0.12);
      color: var(--accent);
      border-radius: 100px;
      font-size: 12px;
      font-weight: 500;
    }
    .tag-chip button { color: var(--accent); opacity: 0.6; font-size: 14px; line-height: 1; padding: 0; }
    .tag-chip button:hover { opacity: 1; }
    .tags-input-wrap input {
      flex: 1;
      min-width: 80px;
      font-size: 14px;
      color: var(--text);
    }
    .tags-input-wrap input::placeholder { color: var(--muted); }

    .btn-save {
      width: 100%;
      padding: 15px;
      background: var(--accent);
      color: #0f0f0f;
      border-radius: var(--r-md);
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.3px;
      transition: transform 0.1s, box-shadow 0.1s;
      margin-top: 8px;
    }
    .btn-save:active { transform: scale(0.98); }
    .btn-save:disabled { opacity: 0.4; pointer-events: none; }

    /* delete */
    .btn-delete {
      width: 100%;
      padding: 13px;
      border: 1px solid rgba(255,71,71,0.25);
      color: var(--danger);
      border-radius: var(--r-md);
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 600;
      transition: background 0.15s;
      margin-top: 6px;
    }
    .btn-delete:hover { background: rgba(255,71,71,0.08); }

    /* toast */
    .toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1e1e1e;
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 200;
      pointer-events: none;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .toast.success { border-color: var(--accent); color: var(--accent); }
    .toast.error   { border-color: var(--danger); color: var(--danger); }

    /* sort bar */
    .sort-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 20px 0;
      flex-shrink: 0;
    }
    .sort-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-family: var(--font-display);
    }
    .sort-btn {
      font-size: 12px;
      color: var(--muted);
      padding: 4px 10px;
      border-radius: 100px;
      border: 1px solid transparent;
      transition: all 0.15s;
    }
    .sort-btn.active { color: var(--accent); border-color: rgba(232,255,71,0.3); }

    /* loading */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 200px;
      flex-direction: column;
      gap: 12px;
      color: var(--muted);
      font-family: var(--font-display);
      font-size: 12px;
    }
    .spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="app">

  <!-- HEADER -->
  <header class="header">
    <div class="header-title">WISH<span>LIST</span></div>
    <button class="btn-icon" id="btnSync" title="Синхронизировать">⟳</button>
  </header>

  <!-- FILTERS -->
  <div class="filters-wrap">
    <div class="search-box">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input id="searchInput" type="text" placeholder="Поиск по названию..." />
    </div>
    <div class="filter-tabs" id="filterTabs">
      <button class="tab active" data-status="all">Все</button>
      <button class="tab" data-status="want">Хочу</button>
      <button class="tab" data-status="ordered">Заказано</button>
      <button class="tab" data-status="done">Куплено</button>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-bar" id="statsBar">
    <div class="stat-chip">
      <div class="stat-label">Всего</div>
      <div class="stat-value" id="statTotal">—</div>
    </div>
    <div class="stat-chip">
      <div class="stat-label">Сумма</div>
      <div class="stat-value accent" id="statSum">—</div>
    </div>
    <div class="stat-chip">
      <div class="stat-label">Куплено</div>
      <div class="stat-value accent2" id="statDone">—</div>
    </div>
  </div>

  <!-- SORT -->
  <div class="sort-bar">
    <span class="sort-label">Сорт:</span>
    <button class="sort-btn active" data-sort="priority">приоритет</button>
    <button class="sort-btn" data-sort="price_asc">цена ↑</button>
    <button class="sort-btn" data-sort="price_desc">цена ↓</button>
    <button class="sort-btn" data-sort="date">дата</button>
  </div>

  <!-- LIST -->
  <div class="list-wrap" id="listWrap">
    <div class="loading" id="loadingState">
      <div class="spinner"></div>
      <span>Загрузка...</span>
    </div>
    <div id="itemsList"></div>
    <div class="empty-state" id="emptyState" style="display:none">
      <div class="big-icon">🛍️</div>
      <p>Список пуст</p>
    </div>
  </div>

 
  <!-- FAB -->
  <button class="fab" id="fabAdd">+</button>
</div>

<!-- OVERLAY -->
<div class="sheet-overlay" id="sheetOverlay"></div>

<!-- BOTTOM SHEET: ADD / EDIT -->
<div class="sheet" id="formSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-head">
    <div class="sheet-title" id="sheetTitle">Новая покупка</div>
    <button class="btn-close" id="sheetClose">✕</button>
  </div>
  <div class="sheet-body">

    <!-- Image upload -->
    <div class="form-group">
      <label class="form-label">Фото</label>
      <div class="img-preview-wrap" id="imgPreviewWrap">
        <span>📷 Добавить фото</span>
        <img id="imgPreviewEl" style="display:none" />
        <div class="img-overlay">🔄 Заменить</div>
      </div>
      <input type="file" id="imgFileInput" accept="image/*" />
    </div>

    <div class="form-group">
      <label class="form-label">Название *</label>
      <input id="fName" class="form-input" type="text" placeholder="Что купить?" />
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Цена (₽)</label>
        <input id="fPrice" class="form-input" type="number" placeholder="0" />
      </div>
      <div class="form-group">
        <label class="form-label">Категория</label>
        <input id="fCategory" class="form-input" type="text" placeholder="одежда..." />
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Ссылка</label>
      <input id="fUrl" class="form-input" type="url" placeholder="https://..." />
    </div>

    <div class="form-group">
      <label class="form-label">Приоритет</label>
      <div class="priority-selector">
        <button class="priority-btn" data-priority="2">🔴 Высокий</button>
        <button class="priority-btn" data-priority="1">🟡 Средний</button>
        <button class="priority-btn" data-priority="0">⚪ Низкий</button>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Статус</label>
      <div class="status-selector">
        <button class="status-btn" data-status-val="want">Хочу</button>
        <button class="status-btn" data-status-val="ordered">Заказано</button>
        <button class="status-btn" data-status-val="done">Куплено</button>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Теги</label>
      <div class="tags-input-wrap" id="tagsInputWrap">
        <input id="tagInput" type="text" placeholder="Добавить тег..." />
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Заметка</label>
      <textarea id="fNotes" class="form-input" placeholder="Дополнительно..."></textarea>
    </div>

    <button class="btn-save" id="btnSave">Сохранить</button>
    <button class="btn-delete" id="btnDelete" style="display:none">Удалить</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- ── SUPABASE SDK ──────────────────────────────── -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script>
// ══════════════════════════════════════════════════
//  ⚙️  КОНФИГУРАЦИЯ — замени на свои значения
// ══════════════════════════════════════════════════
const SUPABASE_URL  = 'https://wjeleewngroogzihfthv.supabase.co';   // ← твой Project URL
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndqZWxlZXduZ3Jvb2d6aWhmdGh2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3OTE1NjQsImV4cCI6MjA5MzM2NzU2NH0.gsBzZ2XCNdp-iP5_cKP12d8eVISmLerhU8LUSR3BJHI';                      // ← твой anon key
const STORAGE_BUCKET = 'media';

// ══════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// ── STATE ──────────────────────────────────────────
let allItems   = [];
let filterStatus = 'all';
let searchQuery  = '';
let sortMode     = 'priority';
let editingId    = null;
let currentTags  = [];
let currentPriority = 1;
let currentStatusVal = 'want';
let imgFile      = null;
let imgUrl       = null;   // уже загруженный или введённый url

// ── DOM REFS ───────────────────────────────────────
const listEl     = document.getElementById('itemsList');
const loadingEl  = document.getElementById('loadingState');
const emptyEl    = document.getElementById('emptyState');
const overlay    = document.getElementById('sheetOverlay');
const sheet      = document.getElementById('formSheet');
const sheetTitle = document.getElementById('sheetTitle');
const btnDelete  = document.getElementById('btnDelete');
const toastEl    = document.getElementById('toast');

// ══════════════════════════════════════════════════
//  SUPABASE HELPERS
// ══════════════════════════════════════════════════
async function fetchItems() {
  const { data, error } = await sb
    .from('purchases')
    .select('*')
    .eq('module', 'shopping')
    .order('priority', { ascending: false });
  if (error) { showToast('Ошибка загрузки: ' + error.message, 'error'); return; }
  allItems = data || [];
}

async function saveItem(payload) {
  if (editingId) {
    const { error } = await sb.from('purchases').update(payload).eq('id', editingId);
    if (error) throw error;
  } else {
    const { error } = await sb.from('purchases').insert({ ...payload, module: 'shopping' });
    if (error) throw error;
  }
}

async function deleteItem(id) {
  const { error } = await sb.from('purchases').delete().eq('id', id);
  if (error) throw error;
}

async function uploadImage(file) {
  const ext  = file.name.split('.').pop();
  const path = `shopping/${Date.now()}.${ext}`;
  const { error } = await sb.storage.from(STORAGE_BUCKET).upload(path, file, { upsert: true });
  if (error) throw error;
  const { data } = sb.storage.from(STORAGE_BUCKET).getPublicUrl(path);
  return data.publicUrl;
}

// ══════════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════════
function getFiltered() {
  let list = [...allItems];

  if (filterStatus !== 'all') list = list.filter(i => i.status === filterStatus);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(i =>
      i.name.toLowerCase().includes(q) ||
      (i.category || '').toLowerCase().includes(q) ||
      (i.tags || []).some(t => t.toLowerCase().includes(q))
    );
  }

  switch (sortMode) {
    case 'price_asc':  list.sort((a,b) => (a.price||0) - (b.price||0)); break;
    case 'price_desc': list.sort((a,b) => (b.price||0) - (a.price||0)); break;
    case 'date':       list.sort((a,b) => new Date(b.created_at) - new Date(a.created_at)); break;
    default:           list.sort((a,b) => (b.priority||0) - (a.priority||0)); break;
  }
  return list;
}

function updateStats() {
  const all  = allItems;
  const total = all.length;
  const sum   = all.filter(i => i.status !== 'done').reduce((s,i) => s + (i.price||0), 0);
  const done  = all.filter(i => i.status === 'done').length;

  document.getElementById('statTotal').textContent = total;
  document.getElementById('statSum').textContent   = sum > 0 ? formatPrice(sum) : '—';
  document.getElementById('statDone').textContent  = done;
}

function render() {
  const list = getFiltered();
  loadingEl.style.display = 'none';

  if (list.length === 0) {
    listEl.innerHTML = '';
    emptyEl.style.display = 'flex';
    return;
  }
  emptyEl.style.display = 'none';

  listEl.innerHTML = list.map((item, idx) => {
    const priorityLabel = item.priority >= 2 ? ['high','🔴 Высокий'] : item.priority === 1 ? ['medium','🟡 Средний'] : ['low','⚪ Низкий'];
    const tags = (item.tags || []).map(t => `<span class="tag-pill">${esc(t)}</span>`).join('');
    const imgHtml = item.photo_url
      ? `<div class="item-img"><img src="${esc(item.photo_url)}" loading="lazy" /></div>`
      : `<div class="item-img">🛍️</div>`;

    return `<div class="item-card status-${item.status}" data-id="${item.id}" style="animation-delay:${idx*0.03}s">
      ${imgHtml}
      <div class="item-body">
        <div class="item-name">${esc(item.name)}</div>
        <div class="item-meta">
          ${item.price ? `<span class="item-price">${formatPrice(item.price)}</span>` : ''}
          ${item.category ? `<span class="item-category">${esc(item.category)}</span>` : ''}
        </div>
        ${tags ? `<div class="item-tags">${tags}</div>` : ''}
      </div>
      <div class="item-right">
        <span class="priority-badge priority-${priorityLabel[0]}">${priorityLabel[1]}</span>
        <span class="status-dot ${item.status === 'ordered' ? 'ordered' : item.status === 'done' ? 'done' : ''}"></span>
      </div>
    </div>`;
  }).join('');

  // click to edit
  listEl.querySelectorAll('.item-card').forEach(card => {
    card.addEventListener('click', () => openEdit(card.dataset.id));
  });

  updateStats();
}

// ══════════════════════════════════════════════════
//  SHEET
// ══════════════════════════════════════════════════
function openSheet() {
  overlay.classList.add('open');
  sheet.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeSheet() {
  overlay.classList.remove('open');
  sheet.classList.remove('open');
  document.body.style.overflow = '';
  resetForm();
}

function resetForm() {
  editingId = null;
  imgFile   = null;
  imgUrl    = null;
  currentTags = [];
  currentPriority = 1;
  currentStatusVal = 'want';

  document.getElementById('fName').value     = '';
  document.getElementById('fPrice').value    = '';
  document.getElementById('fCategory').value = '';
  document.getElementById('fUrl').value      = '';
  document.getElementById('fNotes').value    = '';
  document.getElementById('tagInput').value  = '';

  document.getElementById('imgPreviewEl').style.display = 'none';
  document.getElementById('imgPreviewWrap').querySelector('span').style.display = '';

  renderTagChips();
  refreshPriorityBtns();
  refreshStatusBtns();
  sheetTitle.textContent = 'Новая покупка';
  btnDelete.style.display = 'none';
}

function openAdd() {
  resetForm();
  openSheet();
}

function openEdit(id) {
  const item = allItems.find(i => i.id === id);
  if (!item) return;
  editingId = id;

  document.getElementById('fName').value     = item.name || '';
  document.getElementById('fPrice').value    = item.price || '';
  document.getElementById('fCategory').value = item.category || '';
  document.getElementById('fUrl').value      = item.url || '';
  document.getElementById('fNotes').value    = item.notes || '';

  currentTags      = [...(item.tags || [])];
  currentPriority  = item.priority ?? 1;
  currentStatusVal = item.status || 'want';
  imgUrl           = item.photo_url || null;

  if (imgUrl) {
    const previewImg = document.getElementById('imgPreviewEl');
    previewImg.src = imgUrl;
    previewImg.style.display = 'block';
    document.getElementById('imgPreviewWrap').querySelector('span').style.display = 'none';
  }

  renderTagChips();
  refreshPriorityBtns();
  refreshStatusBtns();
  sheetTitle.textContent = 'Редактировать';
  btnDelete.style.display = 'block';
  openSheet();
}

// ── FORM SUBMIT ────────────────────────────────────
document.getElementById('btnSave').addEventListener('click', async () => {
  const name = document.getElementById('fName').value.trim();
  if (!name) { showToast('Введи название', 'error'); return; }

  const btn = document.getElementById('btnSave');
  btn.disabled = true;
  btn.textContent = 'Сохранение...';

  try {
    let photoUrl = imgUrl;
    if (imgFile) {
      photoUrl = await uploadImage(imgFile);
    }

    const payload = {
      name,
      price:     parseFloat(document.getElementById('fPrice').value) || null,
      category:  document.getElementById('fCategory').value.trim() || null,
      url:       document.getElementById('fUrl').value.trim() || null,
      notes:     document.getElementById('fNotes').value.trim() || null,
      photo_url: photoUrl,
      tags:      currentTags,
      priority:  currentPriority,
      status:    currentStatusVal,
    };

    await saveItem(payload);
    await fetchItems();
    render();
    closeSheet();
    showToast(editingId ? 'Обновлено ✓' : 'Добавлено ✓', 'success');
  } catch (e) {
    showToast('Ошибка: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Сохранить';
  }
});

btnDelete.addEventListener('click', async () => {
  if (!editingId) return;
  if (!confirm('Удалить эту покупку?')) return;
  try {
    await deleteItem(editingId);
    allItems = allItems.filter(i => i.id !== editingId);
    render();
    closeSheet();
    showToast('Удалено', 'success');
  } catch (e) {
    showToast('Ошибка: ' + e.message, 'error');
  }
});

// ── PRIORITY BTNS ──────────────────────────────────
document.querySelectorAll('.priority-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    currentPriority = parseInt(btn.dataset.priority);
    refreshPriorityBtns();
  });
});
function refreshPriorityBtns() {
  document.querySelectorAll('.priority-btn').forEach(btn => {
    const p = parseInt(btn.dataset.priority);
    btn.className = 'priority-btn';
    if (p === currentPriority) {
      btn.classList.add(p === 2 ? 'active-high' : p === 1 ? 'active-medium' : 'active-low');
    }
  });
}

// ── STATUS BTNS ────────────────────────────────────
document.querySelectorAll('.status-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    currentStatusVal = btn.dataset.statusVal;
    refreshStatusBtns();
  });
});
function refreshStatusBtns() {
  document.querySelectorAll('.status-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.statusVal === currentStatusVal);
  });
}

// ── TAGS ───────────────────────────────────────────
const tagInput = document.getElementById('tagInput');
tagInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    addTag(tagInput.value.trim());
  }
  if (e.key === 'Backspace' && !tagInput.value && currentTags.length) {
    currentTags.pop();
    renderTagChips();
  }
});
document.getElementById('tagsInputWrap').addEventListener('click', () => tagInput.focus());

function addTag(val) {
  if (!val || currentTags.includes(val)) { tagInput.value = ''; return; }
  currentTags.push(val);
  tagInput.value = '';
  renderTagChips();
}
function renderTagChips() {
  const wrap = document.getElementById('tagsInputWrap');
  wrap.querySelectorAll('.tag-chip').forEach(el => el.remove());
  currentTags.forEach((t, idx) => {
    const chip = document.createElement('span');
    chip.className = 'tag-chip';
    chip.innerHTML = `${esc(t)}<button data-idx="${idx}">×</button>`;
    chip.querySelector('button').addEventListener('click', () => {
      currentTags.splice(idx, 1);
      renderTagChips();
    });
    wrap.insertBefore(chip, tagInput);
  });
}

// ── IMAGE ──────────────────────────────────────────
document.getElementById('imgPreviewWrap').addEventListener('click', () => {
  document.getElementById('imgFileInput').click();
});
document.getElementById('imgFileInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  imgFile = file;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = document.getElementById('imgPreviewEl');
    img.src = ev.target.result;
    img.style.display = 'block';
    document.getElementById('imgPreviewWrap').querySelector('span').style.display = 'none';
  };
  reader.readAsDataURL(file);
});

// ── SEARCH ─────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value;
  render();
});

// ── FILTER TABS ────────────────────────────────────
document.getElementById('filterTabs').addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  filterStatus = tab.dataset.status;
  render();
});

// ── SORT ───────────────────────────────────────────
document.querySelectorAll('.sort-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    sortMode = btn.dataset.sort;
    render();
  });
});

// ── FAB & CLOSE ────────────────────────────────────
document.getElementById('fabAdd').addEventListener('click', openAdd);
document.getElementById('sheetClose').addEventListener('click', closeSheet);
document.getElementById('sheetOverlay').addEventListener('click', closeSheet);

// ── SYNC BTN ───────────────────────────────────────
document.getElementById('btnSync').addEventListener('click', async () => {
  loadingEl.style.display = 'flex';
  listEl.innerHTML = '';
  emptyEl.style.display = 'none';
  await fetchItems();
  render();
  showToast('Обновлено', 'success');
});

// ══════════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════════
function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function formatPrice(n) {
  return Number(n).toLocaleString('ru-RU') + ' ₽';
}

let toastTimer;
function showToast(msg, type = '') {
  toastEl.textContent = msg;
  toastEl.className = 'toast show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2400);
}

// ══════════════════════════════════════════════════
//  BOOT
// ══════════════════════════════════════════════════
(async () => {
  // пока нет ключей — показываем демо-данные
  if (SUPABASE_URL.includes('YOUR_PROJECT')) {
    allItems = [
      { id:'1', name:'Кроссовки Nike Air Max', price:12990, category:'обувь', status:'want', priority:2, tags:['спорт'], photo_url:'', created_at: new Date().toISOString() },
      { id:'2', name:'Беспроводные наушники', price:8500, category:'техника', status:'ordered', priority:1, tags:['гаджеты','музыка'], photo_url:'', created_at: new Date().toISOString() },
      { id:'3', name:'Кофемолка', price:3200, category:'кухня', status:'done', priority:0, tags:[], photo_url:'', created_at: new Date().toISOString() },
    ];
    render();
    showToast('⚠ Демо-режим — добавь ключи Supabase', 'error');
    return;
  }

  await fetchItems();
  render();
})();
</script>
</body>
</html>
