<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#0c0c0c"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>Покупки</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Geologica:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:      #0c0c0c;
      --s1:      #141414;
      --s2:      #1c1c1c;
      --s3:      #242424;
      --border:  #2e2e2e;
      --text:    #efefef;
      --muted:   #5a5a5a;
      --dim:     #888;
      --accent:  #d4f542;
      --orange:  #ff7043;
      --blue:    #4fc3f7;
      --danger:  #ef5350;
      --r:       12px;
      --rL:      20px;
      --ff:      'Geologica', sans-serif;
      --mono:    'JetBrains Mono', monospace;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden;background:var(--bg)}
    body{font-family:var(--ff);color:var(--text);-webkit-font-smoothing:antialiased;font-size:15px}
    button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
    input,textarea,select{font-family:inherit;color:inherit;background:none;border:none;outline:none}

    /* ── APP SHELL ── */
    #app{display:flex;flex-direction:column;height:100dvh}

    /* ── HEADER ── */
    .hdr{
      flex-shrink:0;
      padding:env(safe-area-inset-top,0) 0 0;
      background:var(--bg);
    }
    .hdr-inner{
      display:flex;align-items:center;gap:10px;
      padding:14px 16px 10px;
    }
    .hdr-logo{
      font-size:17px;font-weight:900;letter-spacing:-0.5px;flex:1;
      font-family:var(--ff);
    }
    .hdr-logo em{color:var(--accent);font-style:normal}
    .hdr-actions{display:flex;gap:6px}
    .icon-btn{
      width:36px;height:36px;border-radius:10px;
      display:flex;align-items:center;justify-content:center;
      background:var(--s2);border:1px solid var(--border);
      font-size:16px;transition:background .15s,transform .1s;
    }
    .icon-btn:active{transform:scale(.9)}
    .icon-btn.active{background:var(--accent);color:#000;border-color:var(--accent)}

    /* ── TABS (status) ── */
    .status-tabs{
      display:flex;gap:4px;padding:0 16px 12px;overflow-x:auto;scrollbar-width:none;
    }
    .status-tabs::-webkit-scrollbar{display:none}
    .stab{
      flex-shrink:0;padding:6px 14px;border-radius:100px;font-size:13px;font-weight:500;
      border:1px solid var(--border);color:var(--muted);background:var(--s2);
      transition:all .15s;
    }
    .stab.on{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700}

    /* ── SEARCH ROW ── */
    .search-row{
      display:flex;gap:8px;padding:0 16px 10px;
    }
    .search-box{
      flex:1;display:flex;align-items:center;gap:8px;
      background:var(--s2);border:1px solid var(--border);border-radius:var(--r);
      padding:9px 12px;transition:border-color .15s;
    }
    .search-box:focus-within{border-color:var(--accent)}
    .search-box svg{color:var(--muted);flex-shrink:0}
    .search-box input{flex:1;font-size:14px}
    .search-box input::placeholder{color:var(--muted)}
    .grid-ctrl{
      display:flex;align-items:center;gap:4px;
      background:var(--s2);border:1px solid var(--border);border-radius:var(--r);
      padding:6px 10px;
    }
    .grid-ctrl span{font-size:12px;color:var(--muted);font-family:var(--mono)}
    .grid-btn{
      width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;
      background:var(--s3);font-size:14px;color:var(--dim);transition:all .15s;
    }
    .grid-btn:hover{color:var(--accent)}

    /* ── STATS STRIP ── */
    .stats-strip{
      display:flex;gap:8px;padding:0 16px 10px;overflow-x:auto;scrollbar-width:none;
    }
    .stats-strip::-webkit-scrollbar{display:none}
    .stat{
      flex-shrink:0;background:var(--s1);border:1px solid var(--border);
      border-radius:var(--r);padding:8px 14px;display:flex;flex-direction:column;gap:1px;
    }
    .stat-l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;font-weight:600}
    .stat-v{font-family:var(--mono);font-size:15px;font-weight:600}
    .stat-v.a{color:var(--accent)}
    .stat-v.o{color:var(--orange)}

    /* ── SCROLL AREA ── */
    .scroll{flex:1;overflow-y:auto;padding:4px 16px 100px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
    .scroll::-webkit-scrollbar{width:3px}
    .scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

    /* ── LOADING / EMPTY ── */
    .center-state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;height:240px;color:var(--muted)}
    .spinner{width:26px;height:26px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .empty-ico{font-size:44px}
    .empty-txt{font-size:13px;font-weight:500}

    /* ── CATEGORY GROUP (list view) ── */
    .cat-group{margin-bottom:20px}
    .cat-header{
      display:flex;align-items:center;justify-content:space-between;
      padding:8px 0 6px;margin-bottom:6px;
      border-bottom:1px solid var(--border);
      position:sticky;top:0;background:var(--bg);z-index:2;
    }
    .cat-name{font-size:13px;font-weight:700;letter-spacing:.3px;display:flex;align-items:center;gap:6px}
    .cat-meta{font-family:var(--mono);font-size:12px;color:var(--muted)}
    .cat-sum{color:var(--accent);font-weight:600}

    /* ── LIST CARD ── */
    .item-card{
      display:flex;align-items:flex-start;gap:12px;
      background:var(--s1);border:1px solid var(--border);border-radius:var(--r);
      padding:12px;margin-bottom:6px;cursor:pointer;
      transition:border-color .15s,transform .1s;
      animation:fadeUp .2s ease both;
      position:relative;overflow:hidden;
    }
    .item-card::before{
      content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
      border-radius:3px 0 0 3px;background:transparent;transition:background .15s;
    }
    .item-card[data-priority="2"]::before{background:var(--orange)}
    .item-card[data-priority="1"]::before{background:var(--accent)}
    .item-card.done .item-name{text-decoration:line-through;color:var(--muted)}
    .item-card:active{transform:scale(.985)}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

    .item-thumb{
      width:56px;height:56px;border-radius:8px;flex-shrink:0;overflow:hidden;
      background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:22px;
    }
    .item-thumb img{width:100%;height:100%;object-fit:cover}
    .item-body{flex:1;min-width:0}
    .item-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
    .item-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .item-price{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--accent)}
    .item-status-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);flex-shrink:0}
    .item-status-dot.ordered{background:var(--orange);box-shadow:0 0 5px var(--orange)}
    .item-status-dot.done{background:var(--accent)}
    .item-tags-row{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px}
    .tag-pill{padding:2px 8px;border-radius:100px;font-size:11px;background:var(--s3);color:var(--dim)}
    .prio-badge{
      flex-shrink:0;align-self:flex-start;
      font-size:10px;font-weight:700;padding:3px 8px;border-radius:100px;font-family:var(--mono);
    }
    .prio-badge.p2{background:rgba(255,112,67,.15);color:var(--orange)}
    .prio-badge.p1{background:rgba(212,245,66,.12);color:var(--accent)}
    .prio-badge.p0{background:var(--s3);color:var(--muted)}

    /* ── GALLERY GRID ── */
    .gallery-grid{
      display:grid;gap:8px;
      grid-template-columns:repeat(var(--cols,2),1fr);
    }
    .gal-card{
      background:var(--s1);border:1px solid var(--border);border-radius:var(--r);
      overflow:hidden;cursor:pointer;transition:border-color .15s,transform .1s;
      animation:fadeUp .2s ease both;position:relative;
    }
    .gal-card:active{transform:scale(.96)}
    .gal-card[data-priority="2"] .gal-prio{background:var(--orange)}
    .gal-card[data-priority="1"] .gal-prio{background:var(--accent)}
    .gal-card[data-priority="0"] .gal-prio{background:var(--s3)}
    .gal-img{
      width:100%;aspect-ratio:1;background:var(--s3);
      display:flex;align-items:center;justify-content:center;font-size:30px;
      overflow:hidden;position:relative;
    }
    .gal-img img{width:100%;height:100%;object-fit:cover}
    .gal-prio{
      position:absolute;top:6px;right:6px;
      width:8px;height:8px;border-radius:50%;
    }
    .gal-body{padding:8px}
    .gal-name{font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:2px}
    .gal-price{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--accent)}
    .gal-tags{display:flex;gap:3px;flex-wrap:wrap;margin-top:4px}
    .gal-tag{font-size:10px;padding:1px 6px;border-radius:100px;background:var(--s3);color:var(--muted)}

    /* ── FAB ── */
    .fab{
      position:fixed;bottom:calc(20px + env(safe-area-inset-bottom,0));right:18px;
      width:54px;height:54px;border-radius:50%;
      background:var(--accent);color:#000;font-size:24px;
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 4px 20px rgba(212,245,66,.4);
      transition:transform .15s,box-shadow .15s;z-index:20;
    }
    .fab:active{transform:scale(.9);box-shadow:0 2px 10px rgba(212,245,66,.2)}

    /* ── OVERLAY & SHEET ── */
    .overlay{
      position:fixed;inset:0;background:rgba(0,0,0,.7);
      z-index:100;opacity:0;pointer-events:none;
      transition:opacity .25s;backdrop-filter:blur(6px);
    }
    .overlay.on{opacity:1;pointer-events:all}
    .sheet{
      position:fixed;bottom:0;left:0;right:0;
      background:var(--s1);border-radius:var(--rL) var(--rL) 0 0;
      border-top:1px solid var(--border);
      z-index:101;max-height:94dvh;display:flex;flex-direction:column;
      transform:translateY(100%);transition:transform .32s cubic-bezier(.16,1,.3,1);
    }
    .sheet.on{transform:translateY(0)}
    .sheet-drag{width:36px;height:4px;background:var(--border);border-radius:4px;margin:12px auto 0;flex-shrink:0}
    .sheet-hdr{
      display:flex;align-items:center;justify-content:space-between;
      padding:14px 18px 10px;flex-shrink:0;
    }
    .sheet-title{font-size:16px;font-weight:700}
    .close-btn{
      width:30px;height:30px;border-radius:8px;background:var(--s3);
      display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:16px;
    }
    .sheet-scroll{overflow-y:auto;padding:0 18px 44px;flex:1;scrollbar-width:thin;scrollbar-color:var(--border) transparent}

    /* ── FORM ── */
    .fg{margin-bottom:14px}
    .fl{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;font-family:var(--mono)}
    .fi{
      width:100%;padding:11px 13px;background:var(--s2);
      border:1px solid var(--border);border-radius:var(--r);font-size:14px;
      color:var(--text);transition:border-color .15s;
    }
    .fi:focus{border-color:var(--accent)}
    .fi::placeholder{color:var(--muted)}
    textarea.fi{resize:vertical;min-height:72px}
    .frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}

    /* category combobox */
    .cat-combo{position:relative}
    .cat-combo input{padding-right:32px}
    .cat-dropdown{
      position:absolute;left:0;right:0;top:calc(100% + 4px);
      background:var(--s2);border:1px solid var(--border);border-radius:var(--r);
      z-index:10;max-height:180px;overflow-y:auto;display:none;
      box-shadow:0 8px 24px rgba(0,0,0,.4);
    }
    .cat-dropdown.open{display:block}
    .cat-opt{
      padding:10px 13px;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:8px;
      transition:background .1s;
    }
    .cat-opt:hover{background:var(--s3)}
    .cat-opt.new-opt{color:var(--accent);font-weight:600}

    /* priority selector */
    .prio-sel{display:flex;gap:8px}
    .prio-opt{
      flex:1;padding:9px 6px;border-radius:var(--r);text-align:center;
      border:1px solid var(--border);background:var(--s2);
      font-size:12px;font-weight:700;font-family:var(--mono);color:var(--muted);
      transition:all .15s;cursor:pointer;
    }
    .prio-opt.on-2{background:rgba(255,112,67,.15);color:var(--orange);border-color:var(--orange)}
    .prio-opt.on-1{background:rgba(212,245,66,.12);color:var(--accent);border-color:var(--accent)}
    .prio-opt.on-0{background:var(--s3);color:var(--text);border-color:#444}

    /* status selector */
    .status-sel{display:flex;gap:6px}
    .status-opt{
      flex:1;padding:9px 4px;border-radius:var(--r);text-align:center;
      border:1px solid var(--border);background:var(--s2);
      font-size:12px;font-weight:600;color:var(--muted);
      transition:all .15s;cursor:pointer;
    }
    .status-opt.on{background:rgba(212,245,66,.1);color:var(--accent);border-color:var(--accent)}

    /* tags input */
    .tags-wrap{
      display:flex;flex-wrap:wrap;gap:5px;padding:8px 10px;
      background:var(--s2);border:1px solid var(--border);border-radius:var(--r);
      min-height:42px;cursor:text;transition:border-color .15s;
    }
    .tags-wrap:focus-within{border-color:var(--accent)}
    .tc{
      display:flex;align-items:center;gap:3px;padding:3px 8px 3px 10px;
      background:rgba(212,245,66,.12);color:var(--accent);border-radius:100px;font-size:12px;font-weight:500;
    }
    .tc button{color:var(--accent);opacity:.6;font-size:13px;line-height:1;padding:0 1px}
    .tc button:hover{opacity:1}
    .tags-wrap input{flex:1;min-width:80px;font-size:14px}
    .tags-wrap input::placeholder{color:var(--muted)}

    /* image upload */
    .img-up{
      width:100%;height:130px;border-radius:var(--r);
      border:1.5px dashed var(--border);background:var(--s2);
      display:flex;align-items:center;justify-content:center;
      gap:8px;color:var(--muted);font-size:13px;cursor:pointer;
      position:relative;overflow:hidden;transition:border-color .15s;
    }
    .img-up:hover{border-color:var(--accent)}
    .img-up img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
    .img-up .img-mask{
      position:absolute;inset:0;background:rgba(0,0,0,.5);
      display:flex;align-items:center;justify-content:center;
      font-size:13px;opacity:0;transition:opacity .15s;
    }
    .img-up:hover .img-mask{opacity:1}
    #imgInput{display:none}

    /* buttons */
    .btn-save{
      width:100%;padding:14px;background:var(--accent);color:#000;
      border-radius:var(--r);font-size:14px;font-weight:800;font-family:var(--mono);
      letter-spacing:.3px;transition:transform .1s;margin-top:6px;
    }
    .btn-save:active{transform:scale(.98)}
    .btn-save:disabled{opacity:.4;pointer-events:none}
    .btn-del{
      width:100%;padding:12px;border:1px solid rgba(239,83,80,.25);color:var(--danger);
      border-radius:var(--r);font-size:13px;font-weight:600;transition:background .15s;margin-top:6px;
    }
    .btn-del:hover{background:rgba(239,83,80,.08)}

    /* ── MANAGE SHEET ── */
    .manage-list{display:flex;flex-direction:column;gap:6px}
    .manage-item{
      display:flex;align-items:center;gap:10px;padding:11px 13px;
      background:var(--s2);border:1px solid var(--border);border-radius:var(--r);
    }
    .manage-emoji{font-size:20px;width:28px;text-align:center}
    .manage-name{flex:1;font-size:14px;font-weight:500}
    .manage-del{color:var(--muted);font-size:18px;padding:2px 6px;transition:color .15s}
    .manage-del:hover{color:var(--danger)}
    .add-cat-row{display:flex;gap:8px;margin-top:10px}
    .add-cat-row input{flex:1}
    .add-cat-row .emoji-in{width:60px;text-align:center}
    .btn-add-sm{
      padding:10px 16px;background:var(--s3);border:1px solid var(--border);
      border-radius:var(--r);font-size:13px;font-weight:600;color:var(--accent);
      transition:background .15s;flex-shrink:0;
    }
    .btn-add-sm:hover{background:var(--s2)}

    /* ── TOAST ── */
    .toast{
      position:fixed;bottom:86px;left:50%;transform:translateX(-50%) translateY(14px);
      background:var(--s2);border:1px solid var(--border);border-radius:100px;
      padding:9px 18px;font-size:13px;font-weight:500;white-space:nowrap;
      opacity:0;transition:opacity .2s,transform .2s;z-index:300;pointer-events:none;
    }
    .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
    .toast.ok{border-color:var(--accent);color:var(--accent)}
    .toast.err{border-color:var(--danger);color:var(--danger)}

    /* sort row */
    .sort-row{display:flex;align-items:center;gap:6px;padding:0 16px 8px;overflow-x:auto;scrollbar-width:none}
    .sort-row::-webkit-scrollbar{display:none}
    .sort-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;flex-shrink:0;font-family:var(--mono)}
    .sort-opt{flex-shrink:0;font-size:12px;color:var(--muted);padding:4px 10px;border-radius:100px;border:1px solid transparent;transition:all .15s}
    .sort-opt.on{color:var(--accent);border-color:rgba(212,245,66,.3)}
  </style>
</head>
<body>
<div id="app">

  <header class="hdr">
    <div class="hdr-inner">
      <div class="hdr-logo">WISH<em>LIST</em></div>
      <div class="hdr-actions">
        <button class="icon-btn" id="btnViewList" title="Список">☰</button>
        <button class="icon-btn active" id="btnViewGallery" title="Галерея">⊞</button>
        <button class="icon-btn" id="btnManageCats" title="Категории">⚙</button>
        <button class="icon-btn" id="btnSync" title="Обновить">⟳</button>
      </div>
    </div>

    <div class="status-tabs" id="statusTabs">
      <button class="stab on" data-s="all">Все</button>
      <button class="stab" data-s="want">Хочу</button>
      <button class="stab" data-s="ordered">Заказано</button>
      <button class="stab" data-s="done">Куплено</button>
    </div>

    <div class="search-row">
      <div class="search-box">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input id="searchIn" type="text" placeholder="Поиск..."/>
      </div>
      <div class="grid-ctrl" id="gridCtrl">
        <button class="grid-btn" id="gridMinus">−</button>
        <span id="gridColsLabel">2</span>
        <button class="grid-btn" id="gridPlus">+</button>
      </div>
    </div>

    <div class="stats-strip" id="statsStrip">
      <div class="stat"><div class="stat-l">Всего</div><div class="stat-v" id="stTotal">—</div></div>
      <div class="stat"><div class="stat-l">Сумма</div><div class="stat-v a" id="stSum">—</div></div>
      <div class="stat"><div class="stat-l">Куплено</div><div class="stat-v o" id="stDone">—</div></div>
      <div class="stat"><div class="stat-l">Осталось</div><div class="stat-v" id="stLeft">—</div></div>
    </div>

    
    <div class="sort-row">
      <span class="sort-lbl">Сорт:</span>
      <button class="sort-opt on" data-sort="priority">приоритет</button>
      <button class="sort-opt" data-sort="price_asc">цена ↑</button>
      <button class="sort-opt" data-sort="price_desc">цена ↓</button>
      <button class="sort-opt" data-sort="date">дата</button>
    </div>
  </header>

  <div class="scroll" id="scrollArea">
    <div class="center-state" id="loadingEl"><div class="spinner"></div><span style="font-size:12px;color:var(--muted)">Загрузка...</span></div>
    <div id="mainList" style="display:none"></div>
    <div class="center-state" id="emptyEl" style="display:none">
      <div class="empty-ico">🛍️</div>
      <div class="empty-txt">Список пуст</div>
    </div>
  </div>

  <button class="fab" id="fabAdd">+</button>
</div>

<!-- OVERLAY -->

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
// ══════════════════════════════════════════════════
// ⚙️ КОНФИГУРАЦИЯ
// ══════════════════════════════════════════════════
const SUPABASE_URL    = 'https://wjeleewngroogzihfthv.supabase.co';
const SUPABASE_ANON   = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndqZWxlZXduZ3Jvb2d6aWhmdGh2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3OTE1NjQsImV4cCI6MjA5MzM2NzU2NH0.gsBzZ2XCNdp-iP5_cKP12d8eVISmLerhU8LUSR3BJHI';
const STORAGE_BUCKET  = 'media';
const DEMO_MODE       = SUPABASE_URL.includes('YOUR_PROJECT');

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// ── STATE ──────────────────────────────────────────
let items      = [];
let categories = [];
let filterStatus  = 'all';
let searchQ       = '';
let sortMode      = 'priority';
let viewMode      = 'gallery'; // 'list' | 'gallery'
let gridCols      = 2;
let editId        = null;
let curTags       = [];
let curPriority   = 1;
let curStatus     = 'want';
let imgFile       = null;
let imgUrl        = null;
let activeSheet   = null; // 'form' | 'manage'

// ── ELEMENTS ──────────────────────────────────────
const $  = id => document.getElementById(id);
const loadingEl = $('loadingEl');
const mainList  = $('mainList');
const emptyEl   = $('emptyEl');

// ══════════════════════════════════════════════════
// SUPABASE
// ══════════════════════════════════════════════════
async function loadItems() {
  if (DEMO_MODE) { items = getDemoItems(); return; }
  const { data, error } = await sb.from('purchases').select('*')
    .eq('module','shopping').order('priority',{ascending:false});
  if (error) { toast('Ошибка: ' + error.message, 'err'); return; }
  items = data || [];
}

async function loadCategories() {
  if (DEMO_MODE) { categories = getDemoCats(); return; }
  const { data, error } = await sb.from('categories').select('*')
    .eq('module','shopping').order('name');
  if (error) return;
  categories = data || [];
}

async function upsertItem(payload) {
  if (editId) {
    const { error } = await sb.from('purchases').update(payload).eq('id', editId);
    if (error) throw error;
  } else {
    const { error } = await sb.from('purchases').insert({...payload, module:'shopping'});
    if (error) throw error;
  }
}

async function removeItem(id) {
  const { error } = await sb.from('purchases').delete().eq('id', id);
  if (error) throw error;
}

async function addCategory(name, emoji) {
  if (DEMO_MODE) { categories.push({id: Date.now()+'', name, emoji, module:'shopping'}); return; }
  const { data, error } = await sb.from('categories').insert({name, emoji, module:'shopping'}).select().single();
  if (error) throw error;
  categories.push(data);
}

async function deleteCategory(id) {
  if (DEMO_MODE) { categories = categories.filter(c => c.id !== id); return; }
  const { error } = await sb.from('categories').delete().eq('id', id);
  if (error) throw error;
  categories = categories.filter(c => c.id !== id);
}

async function uploadImg(file) {
  const ext  = file.name.split('.').pop();
  const path = `purchases/${Date.now()}.${ext}`;
  const { error } = await sb.storage.from(STORAGE_BUCKET).upload(path, file, {upsert:true});
  if (error) throw error;
  return sb.storage.from(STORAGE_BUCKET).getPublicUrl(path).data.publicUrl;
}

// ══════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════
function getVisible() {
  let list = [...items];
  if (filterStatus !== 'all') list = list.filter(i => i.status === filterStatus);
  if (searchQ) {
    const q = searchQ.toLowerCase();
    list = list.filter(i =>
      i.name.toLowerCase().includes(q) ||
      (i.category||'').toLowerCase().includes(q) ||
      (i.tags||[]).some(t => t.toLowerCase().includes(q))
    );
  }
  switch (sortMode) {
    case 'price_asc':  list.sort((a,b) => (a.price||0)-(b.price||0)); break;
    case 'price_desc': list.sort((a,b) => (b.price||0)-(a.price||0)); break;
    case 'date':       list.sort((a,b) => new Date(b.created_at)-new Date(a.created_at)); break;
    default:           list.sort((a,b) => (b.priority||0)-(a.priority||0)); break;
  }
  return list;
}

function render() {
  loadingEl.style.display = 'none';
  const list = getVisible();

  // stats (always from all items, not filtered)
  const want  = items.filter(i => i.status !== 'done');
  $('stTotal').textContent = items.length;
  $('stSum').textContent   = items.length ? fmtPrice(want.reduce((s,i)=>s+(i.price||0),0)) : '—';
  $('stDone').textContent  = items.filter(i => i.status==='done').length;
  $('stLeft').textContent  = want.length;

  if (list.length === 0) {
    mainList.style.display = 'none';
    emptyEl.style.display  = 'flex';
    return;
  }
  emptyEl.style.display  = 'none';
  mainList.style.display = 'block';

  if (viewMode === 'gallery') {
    renderGallery(list);
  } else {
    renderList(list);
  }
}

function renderGallery(list) {
  mainList.innerHTML = `<div class="gallery-grid" style="--cols:${gridCols}" id="galGrid"></div>`;
  const grid = $('galGrid');
  list.forEach((item, idx) => {
    const el = document.createElement('div');
    el.className = 'gal-card';
    el.dataset.priority = item.priority ?? 1;
    el.style.animationDelay = `${idx * 0.02}s`;
    el.dataset.id = item.id;
    const tags = (item.tags||[]).slice(0,3).map(t=>`<span class="gal-tag">${esc(t)}</span>`).join('');
    el.innerHTML = `
      <div class="gal-img">
        ${item.photo_url ? `<img src="${esc(item.photo_url)}" loading="lazy"/>` : '🛍️'}
        <div class="gal-prio"></div>
      </div>
      <div class="gal-body">
        <div class="gal-name">${esc(item.name)}</div>
        ${item.price ? `<div class="gal-price">${fmtPrice(item.price)}</div>` : ''}
        ${tags ? `<div class="gal-tags">${tags}</div>` : ''}
      </div>`;
    el.addEventListener('click', () => openEdit(item.id));
    grid.appendChild(el);
  });
}

function renderList(list) {
  // group by category
  const groups = {};
  list.forEach(item => {
    const cat = item.category || '—';
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(item);
  });

  mainList.innerHTML = Object.entries(groups).map(([cat, grpItems]) => {
    const catSum  = grpItems.filter(i=>i.status!=='done').reduce((s,i)=>s+(i.price||0),0);
    const catEmoji = (categories.find(c=>c.name===cat)||{}).emoji || '📦';
    const cardsHtml = grpItems.map((item, idx) => {
      const p = item.priority ?? 1;
      const pLabel = p===2 ? ['p2','🔴 СРОЧНО'] : p===1 ? ['p1','📅 ПЛАН'] : ['p0','○ ОБЫ'];
      const tags = (item.tags||[]).map(t=>`<span class="tag-pill">${esc(t)}</span>`).join('');
      return `<div class="item-card ${item.status==='done'?'done':''}" data-priority="${p}" data-id="${item.id}" style="animation-delay:${idx*0.025}s">
        <div class="item-thumb">
          ${item.photo_url ? `<img src="${esc(item.photo_url)}" loading="lazy"/>` : '🛍️'}
        </div>
        <div class="item-body">
          <div class="item-name">${esc(item.name)}</div>
          <div class="item-row">
            ${item.price ? `<span class="item-price">${fmtPrice(item.price)}</span>` : ''}
            <span class="item-status-dot ${item.status==='ordered'?'ordered':item.status==='done'?'done':''}"></span>
          </div>
          ${tags ? `<div class="item-tags-row">${tags}</div>` : ''}
        </div>
        <span class="prio-badge ${pLabel[0]}">${pLabel[1]}</span>
      </div>`;
    }).join('');

    return `<div class="cat-group">
      <div class="cat-header">
        <div class="cat-name">${cat==='—'?'📦 Без категории':`${catEmoji} ${esc(cat)}`}</div>
        <div class="cat-meta">${grpItems.length} шт · <span class="cat-sum">${fmtPrice(catSum)}</span></div>
      </div>
      ${cardsHtml}
    </div>`;
  }).join('');

  mainList.querySelectorAll('[data-id]').forEach(el => {
    el.addEventListener('click', () => openEdit(el.dataset.id));
  });
}

// ══════════════════════════════════════════════════
// VIEW TOGGLE
// ══════════════════════════════════════════════════
function setView(mode) {
  viewMode = mode;
  $('btnViewList').classList.toggle('active', mode==='list');
  $('btnViewGallery').classList.toggle('active', mode==='gallery');
  $('gridCtrl').style.display = mode==='gallery' ? 'flex' : 'none';
  render();
}
$('btnViewList').addEventListener('click', () => setView('list'));
$('btnViewGallery').addEventListener('click', () => setView('gallery'));
$('gridMinus').addEventListener('click', () => { if(gridCols>2){gridCols--;$('gridColsLabel').textContent=gridCols;render()} });
$('gridPlus').addEventListener('click',  () => { if(gridCols<6){gridCols++;$('gridColsLabel').textContent=gridCols;render()} });

// ══════════════════════════════════════════════════
// SHEET SYSTEM
// ══════════════════════════════════════════════════
function openSheet(name) {
  activeSheet = name;
  $('overlay').classList.add('on');
  $(name+'Sheet').classList.add('on');
  document.body.style.overflow = 'hidden';
}
function closeSheets() {
  $('overlay').classList.remove('on');
  ['form','manage'].forEach(n => $(n+'Sheet').classList.remove('on'));
  document.body.style.overflow = '';
  activeSheet = null;
}
$('overlay').addEventListener('click', closeSheets);
$('formClose').addEventListener('click', closeSheets);
$('manageClose').addEventListener('click', closeSheets);

// ══════════════════════════════════════════════════
// FORM
// ══════════════════════════════════════════════════
function resetForm() {
  editId = null; imgFile = null; imgUrl = null;
  curTags = []; curPriority = 1; curStatus = 'want';
  $('fName').value = ''; $('fPrice').value = '';
  $('fCat').value  = ''; $('fUrl').value   = '';
  $('fNotes').value = ''; $('tagIn').value = '';
  $('imgPreview').style.display = 'none';
  $('imgUpLabel').style.display = '';
  renderTagChips(); syncPrioBtns(); syncStatusBtns();
  $('formTitle').textContent = 'Новая покупка';
  $('btnDel').style.display = 'none';
}

function openAdd() { resetForm(); openSheet('form'); }

function openEdit(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  editId = id;
  $('fName').value  = item.name || '';
  $('fPrice').value = item.price || '';
  $('fCat').value   = item.category || '';
  $('fUrl').value   = item.url || '';
  $('fNotes').value = item.notes || '';
  curTags     = [...(item.tags||[])];
  curPriority = item.priority ?? 1;
  curStatus   = item.status || 'want';
  imgUrl      = item.photo_url || null;
  if (imgUrl) {
    $('imgPreview').src = imgUrl;
    $('imgPreview').style.display = 'block';
    $('imgUpLabel').style.display = 'none';
  } else {
    $('imgPreview').style.display = 'none';
    $('imgUpLabel').style.display = '';
  }
  renderTagChips(); syncPrioBtns(); syncStatusBtns();
  $('formTitle').textContent = 'Редактировать';
  $('btnDel').style.display = 'block';
  openSheet('form');
}

$('btnSave').addEventListener('click', async () => {
  const name = $('fName').value.trim();
  if (!name) { toast('Введи название', 'err'); return; }
  const btn = $('btnSave');
  btn.disabled = true; btn.textContent = 'Сохранение...';
  try {
    let photo = imgUrl;
    if (imgFile) photo = await uploadImg(imgFile);
    // если категории нет в списке — добавляем
    const catVal = $('fCat').value.trim();
    if (catVal && !categories.find(c => c.name === catVal)) {
      await addCategory(catVal, '📦');
    }
    await upsertItem({
      name, photo_url: photo,
      price:    parseFloat($('fPrice').value) || null,
      category: catVal || null,
      url:      $('fUrl').value.trim() || null,
      notes:    $('fNotes').value.trim() || null,
      tags:     curTags,
      priority: curPriority,
      status:   curStatus,
    });
    await loadItems();
    render();
    closeSheets();
    toast(editId ? 'Обновлено ✓' : 'Добавлено ✓', 'ok');
  } catch(e) {
    toast('Ошибка: ' + e.message, 'err');
  } finally {
    btn.disabled = false; btn.textContent = 'Сохранить';
  }
});

$('btnDel').addEventListener('click', async () => {
  if (!editId) return;
  if (!confirm('Удалить эту покупку?')) return;
  try {
    if (!DEMO_MODE) await removeItem(editId);
    items = items.filter(i => i.id !== editId);
    render(); closeSheets(); toast('Удалено', 'ok');
  } catch(e) { toast('Ошибка: '+e.message,'err'); }
});

// priority buttons
document.querySelectorAll('.prio-opt').forEach(btn => {
  btn.addEventListener('click', () => { curPriority = +btn.dataset.p; syncPrioBtns(); });
});
function syncPrioBtns() {
  document.querySelectorAll('.prio-opt').forEach(btn => {
    btn.className = 'prio-opt';
    if (+btn.dataset.p === curPriority) btn.classList.add(`on-${curPriority}`);
  });
}

// status buttons
document.querySelectorAll('.status-opt').forEach(btn => {
  btn.addEventListener('click', () => { curStatus = btn.dataset.sv; syncStatusBtns(); });
});
function syncStatusBtns() {
  document.querySelectorAll('.status-opt').forEach(btn => {
    btn.classList.toggle('on', btn.dataset.sv === curStatus);
  });
}

// tags
const tagIn = $('tagIn');
tagIn.addEventListener('keydown', e => {
  if (e.key==='Enter'||e.key===',') { e.preventDefault(); addTag(tagIn.value.trim()); }
  if (e.key==='Backspace'&&!tagIn.value&&curTags.length) { curTags.pop(); renderTagChips(); }
});
tagIn.addEventListener('blur', () => { if(tagIn.value.trim()) addTag(tagIn.value.trim()); });
$('tagsWrap').addEventListener('click', () => tagIn.focus());

function addTag(v) {
  if (!v || curTags.includes(v)) { tagIn.value=''; return; }
  curTags.push(v); tagIn.value=''; renderTagChips();
}
function renderTagChips() {
  $('tagsWrap').querySelectorAll('.tc').forEach(el=>el.remove());
  curTags.forEach((t,i) => {
    const chip = document.createElement('span');
    chip.className='tc';
    chip.innerHTML=`${esc(t)}<button data-i="${i}">×</button>`;
    chip.querySelector('button').addEventListener('click',()=>{curTags.splice(i,1);renderTagChips();});
    $('tagsWrap').insertBefore(chip, tagIn);
  });
}

// image
$('imgUp').addEventListener('click', () => $('imgInput').click());
$('imgInput').addEventListener('change', e => {
  const f = e.target.files[0]; if(!f) return;
  imgFile = f;
  const r = new FileReader();
  r.onload = ev => {
    $('imgPreview').src = ev.target.result;
    $('imgPreview').style.display = 'block';
    $('imgUpLabel').style.display = 'none';
  };
  r.readAsDataURL(f);
});

// category combobox
$('fCat').addEventListener('input', () => renderCatDropdown($('fCat').value));
$('fCat').addEventListener('focus', () => renderCatDropdown($('fCat').value));
document.addEventListener('click', e => {
  if (!e.target.closest('.cat-combo')) $('catDropdown').classList.remove('open');
});

function renderCatDropdown(q) {
  const dd = $('catDropdown');
  const filtered = categories.filter(c => !q || c.name.toLowerCase().includes(q.toLowerCase()));
  const showNew  = q && !categories.find(c => c.name.toLowerCase()===q.toLowerCase());
  if (!filtered.length && !showNew) { dd.classList.remove('open'); return; }
  dd.innerHTML = filtered.map(c =>
    `<div class="cat-opt" data-name="${esc(c.name)}">${c.emoji||'📦'} ${esc(c.name)}</div>`
  ).join('') + (showNew ? `<div class="cat-opt new-opt" data-name="${esc(q)}">+ Создать «${esc(q)}»</div>` : '');
  dd.querySelectorAll('.cat-opt').forEach(opt => {
    opt.addEventListener('click', () => {
      $('fCat').value = opt.dataset.name;
      dd.classList.remove('open');
    });
  });
  dd.classList.add('open');
}

// ══════════════════════════════════════════════════
// MANAGE CATEGORIES
// ══════════════════════════════════════════════════
function renderManageList() {
  $('manageList').innerHTML = categories.map(c =>
    `<div class="manage-item">
      <span class="manage-emoji">${c.emoji||'📦'}</span>
      <span class="manage-name">${esc(c.name)}</span>
      <button class="manage-del" data-id="${c.id}">×</button>
    </div>`
  ).join('');
  $('manageList').querySelectorAll('.manage-del').forEach(btn => {
    btn.addEventListener('click', async () => {
      if(!confirm(`Удалить категорию «${btn.closest('.manage-item').querySelector('.manage-name').textContent}»?`)) return;
      await deleteCategory(btn.dataset.id);
      renderManageList();
      toast('Удалено', 'ok');
    });
  });
}

$('btnManageCats').addEventListener('click', () => {
  renderManageList();
  openSheet('manage');
});
$('btnAddCat').addEventListener('click', async () => {
  const name  = $('newCatName').value.trim();
  const emoji = $('newCatEmoji').value.trim() || '📦';
  if (!name) { toast('Введи название', 'err'); return; }
  try {
    await addCategory(name, emoji);
    $('newCatName').value=''; $('newCatEmoji').value='';
    renderManageList(); toast('Добавлено ✓','ok');
  } catch(e) { toast('Ошибка: '+e.message,'err'); }
});

// ══════════════════════════════════════════════════
// CONTROLS
// ══════════════════════════════════════════════════
$('fabAdd').addEventListener('click', openAdd);
$('btnSync').addEventListener('click', async () => {
  loadingEl.style.display='flex'; mainList.style.display='none'; emptyEl.style.display='none';
  await loadItems(); await loadCategories(); render(); toast('Обновлено','ok');
});
$('searchIn').addEventListener('input', e => { searchQ=e.target.value; render(); });
$('statusTabs').addEventListener('click', e => {
  const tab = e.target.closest('.stab'); if(!tab) return;
  document.querySelectorAll('.stab').forEach(t=>t.classList.remove('on'));
  tab.classList.add('on'); filterStatus=tab.dataset.s; render();
});
document.querySelectorAll('.sort-opt').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sort-opt').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on'); sortMode=btn.dataset.sort; render();
  });
});

// ══════════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════════
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtPrice(n) {
  if(!n&&n!==0) return '—';
  return Number(n).toLocaleString('ru-RU') + ' ₽';
}
let _toastTimer;
function toast(msg, type='') {
  const el = $('toast');
  el.textContent=msg; el.className='toast on '+(type||'');
  clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>el.classList.remove('on'),2500);
}
